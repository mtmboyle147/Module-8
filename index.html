<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryanair AMC Phase 2 Mastery</title>
<style>
    :root {
        --theme: #22c55e;
        --theme-dark: #15803d;
        --theme-light: #dcfce7;

        --bg: #121212;
        --card: #1e1e1e;
        --card-alt: #2a2a2a;
        --text: #f5f5f5;
        --border: #444;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        line-height: 1.6;
        max-width: 800px;
        margin: 2rem auto;
        padding: 1rem;
        background: var(--bg);
        color: var(--text);
    }

    .quiz-container {
        background: var(--card);
        padding: 2rem;
        border-radius: 12px;
        border-top: 8px solid var(--theme);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .header-box {
        text-align: center;
        margin-bottom: 2rem;
    }

    .progress-bar {
        height: 10px;
        background: #333;
        border-radius: 5px;
        margin: 10px 0;
        overflow: hidden;
    }

    #progress-fill {
        height: 100%;
        width: 0%;
        background: var(--theme);
        transition: width 0.3s ease;
    }

    .question-text {
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 1.5rem;
        display: block;
    }

    .option {
        display: flex;
        align-items: center;
        padding: 12px;
        margin-bottom: 10px;
        background: var(--card-alt);
        border: 2px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        color: var(--text);
        transition: all .2s ease;
    }

    .option:hover {
        border-color: var(--theme);
        background: #1d3a28;
        transform: translateX(5px);
    }

    .option input {
        margin-right: 15px;
        transform: scale(1.2);
    }

    .feedback {
        margin: 1.5rem 0;
        padding: 1rem;
        border-radius: 6px;
        display: none;
        font-weight: bold;
        border-left: 5px solid;
    }

    .correct-msg {
        background: #173d25;
        color: #8cffb0;
        border-color: var(--theme);
    }

    .wrong-msg {
        background: #4a1d23;
        color: #ff9ea8;
        border-color: #ff4d4d;
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        margin-top: 10px;
        transition: all .2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        filter: brightness(110%);
    }

    #submit-btn {
        background: var(--theme);
        color: white;
    }

    #submit-btn:hover {
        background: var(--theme-dark);
    }

    #next-btn {
        background: var(--theme-dark);
        color: white;
        display: none;
    }

    #next-btn:hover {
        background: var(--theme);
    }

    #final-score {
        text-align: center;
        display: none;
    }

    #final-score button {
        background: var(--theme);
        color: white;
    }

    h1, h2 {
        color: var(--theme);
    }

    a {
        color: var(--theme);
    }

    hr {
        border: none;
        border-top: 1px solid var(--border);
    }
</style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="header-box">
            <h1>Module 8 Basic Aerodynamics Quiz</h1>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <p>Question <span id="current-num">1</span> of <span id="total-num">0</span></p>
        </div>

        <div id="question-area">
            <span class="question-text" id="q-text"></span>
            <div id="options-list"></div>
        </div>

        <div id="feedback-area" class="feedback"></div>
        <button id="submit-btn" onclick="checkAnswer()">Submit Answer</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question &rarr;</button>
    </div>

    <div id="final-score">
        <h2>Section Complete!</h2>
        <p style="font-size: 2rem;">Score: <span id="score-val">0</span> / <span id="total-final">0</span></p>
        <button onclick="location.reload()" style="background: var(--theme); color:white;">Restart Quiz</button>
    </div>
</div>

<script>
   
    const allQuestions = [
        
    //Atmosphere and ISA

    { q: "The International Standard Atmosphere (ISA) is based on atmospheric conditions representative of approximately:", options: ["The Equator", "45° North latitude", "The North Pole", "The Tropic of Cancer"], correct: 1, info: "The ISA is a hypothetical atmosphere based on average conditions at approximately 45° latitude and is used for aircraft performance calculations and instrument calibration." },

    { q: "Atmospheric pressure decreases with altitude because:", options: ["Gravity becomes stronger", "There is less air above compressing the atmosphere below", "Air temperature always increases", "Humidity decreases"], correct: 1, info: "Pressure decreases because the weight of the air above reduces with altitude, resulting in less compression of the air below." },

    { q: "At approximately what altitude is atmospheric pressure about half its sea-level value under ISA conditions?", options: ["8,000 ft", "12,000 ft", "18,000 ft", "24,000 ft"], correct: 2, info: "A useful aviation reference is that atmospheric pressure is approximately half of sea-level pressure at 18,000 ft under ISA conditions." },

    { q: "If a pressure gauge reads 25 psi gauge pressure at sea level, what is the approximate absolute pressure?", options: ["10.3 psi", "25.0 psi", "39.7 psi", "43.8 psi"], correct: 2, info: "Absolute pressure equals gauge pressure plus atmospheric pressure. At sea level: 25 + 14.7 ≈ 39.7 psi." },

    { q: "As outside air temperature decreases, the service ceiling of an aircraft generally:", options: ["Decreases", "Increases", "Remains unchanged", "Depends only on aircraft weight"], correct: 1, info: "Colder air is denser, improving both lift and engine performance, allowing a higher service ceiling." },

    { q: "The indicated airspeed at which an aircraft stalls is, for practical purposes:", options: ["Higher at altitude", "Lower at altitude", "Approximately constant with altitude", "Directly proportional to air density"], correct: 2, info: "Although the true airspeed at the stall increases with altitude, the indicated stall speed remains approximately constant." },

    { q: "Which statement correctly defines relative humidity?", options: ["The mass of water vapour per cubic metre of air", "The ratio of the water vapour present to the maximum the air can hold at that temperature", "The temperature at which condensation begins", "The total amount of moisture condensed from the atmosphere"], correct: 1, info: "Relative humidity compares the actual water vapour content with the maximum possible at the same temperature." },

    { q: "Absolute humidity is best defined as:", options: ["The ratio of water vapour present to saturation", "The temperature at which condensation begins", "The actual mass of water vapour contained in a given volume of air", "The amount of rainfall in the atmosphere"], correct: 2, info: "Absolute humidity is the actual quantity of water vapour contained in a given volume of air. This corrects an error in the original source document." },

    { q: "The dew point is defined as:", options: ["The freezing point of water vapour", "The temperature at which humid air becomes saturated when cooled at constant pressure", "The temperature at which relative humidity becomes zero", "The ISA sea-level temperature"], correct: 1, info: "When air is cooled to its dew point, condensation begins because the air has become saturated." },

    { q: "The speed of sound in the atmosphere is primarily affected by:", options: ["Atmospheric pressure", "Air density", "Air temperature", "Relative humidity"], correct: 2, info: "The speed of sound depends almost entirely on absolute air temperature and is independent of pressure for practical aviation purposes." },

    //Atmosphere, Altimetry and Gas Laws

    { q: "Standard atmospheric pressure at mean sea level under ISA conditions is approximately:", options: ["760 mmHg, 1013.25 hPa and 14.7 psi", "700 mmHg, 1000 hPa and 15.0 psi", "760 mmHg, 980 hPa and 14.7 psi", "1013 mmHg, 760 psi and 29.92 hPa"], correct: 0, info: "ISA standard pressure is 1013.25 hPa (mb), equivalent to 760 mmHg, 29.92 inHg and approximately 14.7 psi." },

    { q: "Which instrument directly measures atmospheric pressure using a column of mercury?", options: ["Aneroid altimeter", "Mercury barometer", "Pitot tube", "Vertical speed indicator"], correct: 1, info: "A mercury barometer measures atmospheric pressure by balancing it against the height of a mercury column." },

    { q: "QNH is the altimeter setting that causes the instrument to indicate:", options: ["Zero on the airfield", "Height above the runway", "Aerodrome elevation above mean sea level while on the ground", "Flight Level 000"], correct: 2, info: "QNH is sea-level pressure reduced from the station pressure so that the altimeter reads the aerodrome elevation when on the ground." },

    { q: "QNE is obtained by setting the altimeter to:", options: ["The current aerodrome pressure", "1013.25 hPa (29.92 inHg)", "The local QNH", "Zero feet"], correct: 1, info: "QNE is the standard pressure setting of 1013.25 hPa used when flying Flight Levels." },

    { q: "Which of the following correctly identifies the three principal ICAO pressure settings?", options: ["QFE, QNH and QNE", "QEF, QNH and QEN", "QNE, QNF and QFH", "QFF, QNE and QFG"], correct: 0, info: "The standard ICAO pressure settings are QFE, QNH and QNE." },

    { q: "Boyle's Law states that for a fixed mass of gas at constant temperature:", options: ["Pressure is directly proportional to volume", "Pressure is inversely proportional to volume", "Volume is directly proportional to absolute temperature", "Pressure is directly proportional to absolute temperature"], correct: 1, info: "Boyle's Law states that PV = constant when temperature remains constant." },

    { q: "According to Charles' Law, if the absolute temperature of a gas increases while pressure remains constant, the volume will:", options: ["Decrease", "Remain constant", "Increase", "Become independent of pressure"], correct: 2, info: "Charles' Law states that volume is directly proportional to absolute temperature at constant pressure." },

    { q: "According to the Pressure Law (Gay-Lussac's Law), if the temperature of a fixed volume of gas increases, the pressure will:", options: ["Decrease", "Remain constant", "Increase in direct proportion to absolute temperature", "Increase only if the density changes"], correct: 2, info: "For a constant volume, pressure is directly proportional to absolute temperature." },

    { q: "The combined gas law is commonly expressed as:", options: ["PV = constant", "P/T = constant", "PV/T = constant", "Pρ/T = constant"], correct: 2, info: "The combined gas law relates pressure, volume and absolute temperature: PV/T = constant." },

    { q: "The tropopause is best defined as the:", options: ["Layer where temperature decreases most rapidly", "Boundary between the troposphere and the stratosphere", "Region where atmospheric pressure becomes zero", "Upper limit of the ionosphere"], correct: 1, info: "The tropopause separates the troposphere from the stratosphere and is located at approximately 36,000 ft (11 km) in the ISA." },

    //Stability and Aircraft Balance
   
    { q: "Aircraft stability is best defined as the:", options: ["Ability to change direction rapidly", "Tendency to return to its original trimmed flight condition after a disturbance", "Ability to fly at maximum speed", "Capability of producing lift"], correct: 1, info: "Stability is the tendency of an aircraft to return towards its original equilibrium after being disturbed." },

    { q: "An aircraft is said to possess static stability if, after a disturbance:", options: ["It immediately returns to equilibrium", "It initially tends to return towards its original position", "It oscillates with constant amplitude", "It continues moving away from equilibrium"], correct: 1, info: "Static stability refers only to the initial tendency to return towards equilibrium after the disturbing force is removed." },
    
    { q: "Dynamic stability is demonstrated when an aircraft:", options: ["Returns to equilibrium with progressively decreasing oscillations", "Returns instantly without oscillation", "Maintains constant oscillations indefinitely", "Continues diverging from equilibrium"], correct: 0, info: "Dynamic stability describes how the aircraft behaves over time after the initial disturbance." },
    
    { q: "An aircraft that oscillates with constant amplitude following a disturbance is said to have:", options: ["Positive dynamic stability", "Neutral dynamic stability", "Negative static stability", "Directional instability"], correct: 1, info: "Constant-amplitude oscillations indicate neutral dynamic stability." },
    
    { q: "Which statement correctly describes a dynamically unstable aircraft?", options: ["Oscillations decrease with time", "Oscillations remain constant", "Oscillations increase with time", "The aircraft immediately returns to equilibrium"], correct: 2, info: "Increasing oscillations indicate dynamic instability, even if the aircraft is statically stable." },
    
    { q: "Which aircraft component provides the greatest contribution to longitudinal stability?", options: ["Vertical stabiliser", "Wing dihedral", "Horizontal tailplane", "Ailerons"], correct: 2, info: "The horizontal tailplane provides the restoring pitching moment required for longitudinal stability." },
    
    { q: "The pendulum effect of a high-wing aircraft primarily increases:", options: ["Directional stability", "Longitudinal stability", "Lateral stability", "Spiral instability"], correct: 2, info: "Because the fuselage hangs below the wing, a high-wing aircraft gains additional lateral stability from the pendulum effect." },
    
    { q: "Wing sweep contributes to lateral stability because a sideslip causes:", options: ["The retreating wing to generate more lift", "The advancing wing to experience a higher effective aspect ratio and produce more lift", "Both wings to produce identical lift", "The aircraft to lose directional stability"], correct: 1, info: "During a sideslip, the advancing swept wing experiences a higher effective aspect ratio and generates more lift, helping to level the aircraft." },
    
    { q: "Moving the centre of gravity towards its aft limit generally makes an aircraft:", options: ["More longitudinally stable", "Less longitudinally stable", "More directionally stable", "Immune to stalls"], correct: 1, info: "An aft CG reduces the restoring pitching moment, making the aircraft less longitudinally stable and more difficult to recover from disturbances." },
    
    { q: "A yaw damper is primarily installed to:", options: ["Increase roll rate", "Prevent Dutch Roll by automatically correcting yaw oscillations", "Reduce elevator forces", "Control pitch trim at high Mach numbers"], correct: 1, info: "Yaw dampers automatically apply rudder inputs to damp out yaw oscillations and prevent Dutch Roll." },


    //Flight Mechanics and Stability

    { q: "Moving the aircraft's centre of gravity forward will generally:", options: ["Increase longitudinal stability but require greater tailplane download", "Reduce longitudinal stability and reduce tailplane download", "Have no effect on stability", "Eliminate the need for elevator trim"], correct: 0, info: "A forward CG increases longitudinal stability but requires the tailplane to produce a greater downward force, increasing wing loading and stall speed." },

    { q: "An aircraft with an aft centre of gravity is more likely to:", options: ["Require greater elevator force during flare", "Recover more easily from a stall", "Experience reduced longitudinal stability and more difficult stall recovery", "Have a lower cruise speed due to increased drag"], correct: 2, info: "An aft CG reduces the restoring moment provided by the tailplane, making the aircraft less stable and reducing natural stall recovery characteristics." },
    
    { q: "In a coordinated turn, the lift vector is:", options: ["Always vertical", "Inclined towards the centre of the turn", "Parallel to the aircraft fuselage", "Directed opposite to the turn"], correct: 1, info: "When the aircraft banks, the lift vector tilts. Its horizontal component provides the centripetal force required for the turn." },
    
    { q: "If bank angle is increased while maintaining altitude, the pilot must:", options: ["Decrease angle of attack", "Increase lift by increasing angle of attack or airspeed", "Reduce thrust to maintain balance", "Lower the landing gear"], correct: 1, info: "As bank angle increases, more lift is required to maintain altitude because only the vertical component of lift supports the aircraft's weight." },
    
    { q: "The best glide speed is the speed that provides:", options: ["Minimum sink rate", "Maximum lift coefficient", "Maximum lift-to-drag ratio", "Minimum drag coefficient"], correct: 2, info: "Best glide speed corresponds to the maximum lift-to-drag (L/D) ratio, producing the greatest horizontal distance travelled." },
    
    { q: "Minimum sink speed differs from best glide speed because it is selected to:", options: ["Travel the greatest horizontal distance", "Remain airborne for the longest possible time", "Produce the lowest drag", "Maximise cruise efficiency"], correct: 1, info: "Minimum sink speed provides the lowest rate of descent, maximising endurance rather than range." },
    
    { q: "Which statement about the four aerodynamic forces in steady, level flight is correct?", options: ["Lift equals weight and thrust equals drag", "Lift exceeds weight and thrust equals drag", "Lift equals drag and thrust equals weight", "Thrust exceeds lift"], correct: 0, info: "In steady, unaccelerated level flight, all forces are balanced: lift equals weight and thrust equals drag." },
    
    { q: "During an unpowered steady glide, the force replacing engine thrust is:", options: ["Lift", "The forward component of the aircraft's weight", "The horizontal component of drag", "The tailplane download"], correct: 1, info: "In a glide, gravity provides the energy to keep the aircraft moving forward. The forward component of weight balances drag." },
    
    { q: "Which statement best describes induced downwash?", options: ["It increases the wing's effective angle of attack", "It decreases the wing's effective angle of attack by deflecting the airflow downward", "It only occurs when flaps are extended", "It is produced only at transonic speeds"], correct: 1, info: "Induced downwash changes the local airflow direction, reducing the wing's effective angle of attack and contributing to induced drag." },
    
    { q: "As aircraft weight increases while maintaining the same configuration, the speed for minimum total drag (VMD) will generally:", options: ["Decrease", "Remain unchanged", "Increase", "Become equal to stall speed"], correct: 2, info: "A heavier aircraft must fly faster to achieve the angle of attack corresponding to minimum total drag, so VMD increases with weight." },


    //Advanced Aerodynamics & Performance

    { q: "A laminar boundary layer produces less skin-friction drag than a turbulent boundary layer because it:", options: ["Contains more kinetic energy", "Has less mixing between adjacent airflow layers", "Produces stronger vortices", "Creates a higher pressure differential"], correct: 1, info: "Laminar flow has minimal mixing between airflow layers, resulting in lower skin-friction drag than turbulent flow." },

    { q: "Although a turbulent boundary layer creates more skin-friction drag, it is often desirable because it:", options: ["Eliminates induced drag", "Delays boundary layer separation", "Reduces aircraft weight", "Reduces the angle of attack"], correct: 1, info: "A turbulent boundary layer has more energy and is better able to resist an adverse pressure gradient before separating." },
    
    { q: "On a typical aerofoil, the boundary layer is generally thickest:", options: ["At the leading edge", "At the point of maximum thickness", "Near the trailing edge", "At the wing root only"], correct: 2, info: "The boundary layer grows progressively as airflow moves rearwards, making it thickest near the trailing edge." },
    
    { q: "The transition point on a wing is the point where:", options: ["The airflow separates from the wing", "The boundary layer changes from laminar to turbulent", "The airflow becomes supersonic", "The centre of pressure changes direction"], correct: 1, info: "The transition point marks the change from laminar to turbulent boundary-layer flow." },
    
    { q: "The primary purpose of countersunk (flush) rivets on high-speed aircraft is to:", options: ["Increase structural strength only", "Reduce skin-friction and interference drag", "Increase wing loading", "Delay the stall"], correct: 1, info: "Flush rivets minimise airflow disturbance, reducing parasite drag compared with protruding-head rivets." },
    
    { q: "According to Newton's Third Law, a jet engine produces thrust because:", options: ["Air accelerates naturally through the intake", "The engine pushes exhaust gases rearwards, producing an equal and opposite forward reaction", "Lift is converted directly into thrust", "Atmospheric pressure pushes the aircraft forwards"], correct: 1, info: "Jet propulsion is a direct application of Newton's Third Law of Motion." },
    
    { q: "For the same thrust, a propulsive system with a lower exhaust velocity and a larger mass flow generally:", options: ["Is less efficient", "Has the same efficiency", "Is more propulsively efficient", "Produces no useful thrust"], correct: 2, info: "Accelerating a large mass of air by a small amount is generally more efficient than accelerating a small mass by a large amount." },
    
    { q: "Compared with a turbojet, a high-bypass turbofan engine is generally:", options: ["Less fuel efficient and noisier", "More fuel efficient and quieter", "Less efficient but quieter", "More efficient only at supersonic speeds"], correct: 1, info: "High-bypass turbofans achieve better propulsive efficiency and significantly lower noise levels than turbojets." },
    
    { q: "On a hot, humid day, aircraft take-off performance is reduced primarily because:", options: ["Air density is reduced", "Engine oil temperature decreases", "Wing loading decreases", "Static pressure increases"], correct: 0, info: "High temperature and humidity reduce air density, decreasing both engine performance and lift." },
    
    { q: "An increase in humidity, while pressure and temperature remain constant, generally causes air density to:", options: ["Increase", "Remain unchanged", "Decrease", "Double"], correct: 2, info: "Water vapour is less dense than dry air, so humid air is slightly less dense than dry air under the same conditions." },


    //Operqtional Aerodynamics


    { q: "Ground effect reduces induced drag because:", options: ["The wing generates less lift", "Wingtip vortices are weakened by interference from the ground", "Profile drag is eliminated", "The aircraft weight is effectively reduced"], correct: 1, info: "When operating close to the ground, wingtip vortices are restricted, reducing induced drag and improving lift efficiency." },

    { q: "Compared with flight outside ground effect, an aircraft in ground effect will generally:", options: ["Require a higher angle of attack for the same lift", "Require less power to maintain level flight", "Experience greater induced drag", "Experience a lower lift-to-drag ratio"], correct: 1, info: "Reduced induced drag means less thrust (and therefore less power) is required to maintain level flight." },
    
    { q: "The primary reason an aircraft may float during landing is:", options: ["Reduced parasite drag in ground effect", "Reduced induced drag allowing the aircraft to remain airborne longer", "An increase in wing loading", "An increase in profile drag"], correct: 1, info: "Ground effect improves lift efficiency, often causing the aircraft to float if excess speed is carried into the flare." },
    
    { q: "If power is suddenly lost in straight and level flight, the aircraft will initially:", options: ["Maintain altitude indefinitely", "Pitch nose down until a glide is established", "Immediately stall", "Pitch nose up"], correct: 1, info: "Loss of thrust removes one of the balancing forces. The aircraft naturally pitches into a glide until a new equilibrium is established." },
    
    { q: "The primary purpose of the vertical stabiliser is to:", options: ["Provide pitch stability", "Provide directional stability", "Increase lift", "Reduce induced drag"], correct: 1, info: "The vertical stabiliser (fin) provides stability about the normal (yaw) axis." },
    
    { q: "The rudder is primarily used to:", options: ["Maintain longitudinal stability", "Control yaw about the normal axis", "Increase lift during take-off", "Control pitch during landing"], correct: 1, info: "The rudder controls aircraft motion about the normal (vertical) axis." },
    
    { q: "Which condition produces the greatest true landing speed?", options: ["Cold, dry air", "Cold, humid air", "Hot, humid air", "Standard ISA conditions"], correct: 2, info: "High temperature and humidity reduce air density, increasing the true airspeed required for the same indicated landing speed." },
    
    { q: "A high-wing aircraft generally possesses greater lateral stability because of:", options: ["Higher aspect ratio", "The pendulum effect and keel effect", "Greater wing loading", "Lower induced drag"], correct: 1, info: "The combination of the pendulum effect and fuselage keel effect gives high-wing aircraft improved lateral stability." },
    
    { q: "The aerodynamic force acting perpendicular to the relative airflow is:", options: ["Weight", "Lift", "Drag", "Thrust"], correct: 1, info: "Lift is always defined as the component of aerodynamic force perpendicular to the relative airflow." },
    
    { q: "The aerodynamic force acting parallel and opposite to the relative airflow is:", options: ["Weight", "Lift", "Thrust", "Drag"], correct: 3, info: "Drag is the aerodynamic force acting parallel and opposite to the direction of the relative airflow." },


    //Final Fixed Wing Additions

    { q: "If a stall strip is missing from one wing, the most likely consequence at or near the stall is:", options: ["Reduced induced drag", "Asymmetrical stall characteristics and reduced aileron effectiveness", "Improved roll control", "A lower stall speed"], correct: 1, info: "Stall strips are designed to ensure the wing root stalls first. Missing strips can alter stall progression and lead to asymmetric handling." },

{ q: "The primary purpose of a stall strip is to:", options: ["Increase maximum lift", "Ensure the wing root stalls before the wingtip", "Reduce parasite drag", "Improve cruise performance"], correct: 1, info: "A stall strip locally disturbs the airflow, causing the wing root to stall first and preserving aileron effectiveness." },

{ q: "Many modern transport aircraft use a stick shaker because it:", options: ["Automatically recovers the aircraft from a stall", "Provides a tactile warning of an approaching stall", "Increases elevator effectiveness", "Deploys the speed brakes automatically"], correct: 1, info: "A stick shaker vibrates the control column as the aircraft approaches the critical angle of attack, providing an unmistakable stall warning." },

{ q: "Some aircraft incorporate a stick pusher system to:", options: ["Increase elevator authority during take-off", "Automatically reduce the angle of attack before a deep stall develops", "Improve pitch control during landing", "Assist the autopilot during cruise"], correct: 1, info: "A stick pusher automatically applies a nose-down control input when the aircraft approaches a critical angle of attack." },

{ q: "Compared with a conventional wing, a delta wing generally:", options: ["Has a lower critical angle of attack", "Can sustain a higher angle of attack before stalling", "Produces less induced drag at all speeds", "Requires leading-edge slats for normal operation"], correct: 1, info: "Delta wings generate stable leading-edge vortices, allowing them to operate at significantly higher angles of attack before stall." },

{ q: "The leading-edge vortices formed on a delta wing primarily:", options: ["Increase profile drag only", "Increase lift at high angles of attack", "Reduce wing area", "Reduce the critical Mach number"], correct: 1, info: "Strong leading-edge vortices create additional suction over the upper surface, increasing lift at high angles of attack." },

{ q: "A Fowler flap differs from a plain flap because it:", options: ["Only increases camber", "Increases both wing area and camber", "Reduces wing area", "Produces less lift than a plain flap"], correct: 1, info: "A Fowler flap translates rearwards before deflecting, increasing wing area as well as camber." },

{ q: "The principal aerodynamic advantage of Krueger flaps is that they:", options: ["Reduce induced drag during cruise", "Increase the leading-edge camber for improved low-speed performance", "Reduce wing loading", "Replace the function of trailing-edge flaps"], correct: 1, info: "Krueger flaps deploy from the lower leading edge, increasing camber and delaying stall during take-off and landing." },

{ q: "For a given indicated airspeed, increasing aircraft weight causes the angle of attack required for level flight to:", options: ["Decrease", "Remain unchanged", "Increase", "Become zero"], correct: 2, info: "A heavier aircraft requires a higher lift coefficient at the same IAS, achieved by increasing the angle of attack." },

{ q: "The critical angle of attack at which a wing stalls is primarily determined by the:", options: ["Wing loading", "Aerofoil shape and high-lift device configuration", "Aircraft weight", "Outside air temperature"], correct: 1, info: "The critical angle of attack depends mainly on the aerofoil design and any deployed high-lift devices, not on aircraft weight." },


//Master Bank

{ q: "According to the International Standard Atmosphere (ISA), the standard atmospheric conditions are referenced to:", options: ["The Equator at sea level", "45° latitude at mean sea level", "The North Pole at sea level", "The Tropopause"], correct: 1, info: "The ISA is based on standard atmospheric conditions referenced to mean sea level at 45° latitude." },

{ q: "As altitude increases, atmospheric pressure:", options: ["Decreases exponentially", "Decreases at a constant rate", "Remains constant", "Increases exponentially"], correct: 0, info: "Atmospheric pressure decreases exponentially with altitude because both air density and the mass of air above decrease." },

{ q: "At approximately what altitude is atmospheric pressure about half of its sea-level value?", options: ["8,000 ft", "12,000 ft", "18,000 ft", "24,000 ft"], correct: 2, info: "Atmospheric pressure is approximately half of the sea-level value at 18,000 ft." },

{ q: "If the gauge pressure is 25 PSI at standard sea level, what is the absolute pressure?", options: ["39.7 PSI", "25.0 PSI", "14.7 PSI", "43.8 PSI"], correct: 0, info: "Absolute pressure equals gauge pressure plus atmospheric pressure: 25 + 14.7 = 39.7 PSI." },

{ q: "As atmospheric temperature decreases, atmospheric pressure generally:", options: ["Increases proportionally", "Remains unchanged", "Decreases proportionally", "Becomes independent of temperature"], correct: 2, info: "Pressure and temperature are directly related for a given volume, so a decrease in temperature results in a decrease in pressure." },

{ q: "As air becomes colder, the service ceiling of an aircraft generally:", options: ["Decreases", "Remains unchanged", "Increases", "Depends only on aircraft weight"], correct: 2, info: "Colder air is denser, increasing both lift and engine performance, allowing a higher service ceiling." },

{ q: "What is the ISA standard sea-level pressure?", options: ["1012.3 hPa", "1013.2 hPa", "1023.2 hPa", "1000.0 hPa"], correct: 1, info: "The ISA standard sea-level pressure is 1013.2 hPa (1013.25 hPa rounded)." },

{ q: "How does the indicated airspeed (IAS) at the stall vary with altitude?", options: ["It increases", "It decreases", "It remains practically constant", "It doubles above 10,000 ft"], correct: 2, info: "Stall IAS remains approximately constant because IAS is related to dynamic pressure rather than true airspeed." },

{ q: "How does the true airspeed (TAS) at the stall change with increasing altitude?", options: ["It decreases", "It remains constant", "It increases", "It becomes equal to IAS"], correct: 2, info: "As air density decreases with altitude, a higher true airspeed is required to produce the same lift." },

{ q: "Which ISA sea-level temperature is used as the international standard?", options: ["10°C", "15°C", "20°C", "25°C"], correct: 1, info: "The ISA standard sea-level temperature is +15°C." },

{ q: "When a leading-edge flap (slat) is fully extended, what is the primary purpose of the slot that is formed?", options: ["To re-energise the boundary layer", "To increase fuel flow over the wing", "To provide space for the flap when retracted", "To reduce wing loading"], correct: 0, info: "The slot allows high-energy air from the lower surface to flow over the upper surface, re-energising the boundary layer and delaying flow separation." },

{ q: "What is the primary purpose of wing fences on a swept wing?", options: ["To increase wing area", "To prevent spanwise airflow and improve aileron effectiveness", "To reduce aircraft weight", "To increase engine cooling airflow"], correct: 1, info: "Wing fences reduce spanwise airflow, helping to delay wingtip stall and maintain lateral control." },

{ q: "A symmetrical fin aerofoil will produce a side force:", options: ["Only when the rudder is deflected", "Only during yaw", "When an effective angle of attack is created by either yaw or rudder deflection", "Only during crosswind landings"], correct: 2, info: "A side force is produced whenever the fin experiences an angle of attack, whether caused by yaw or rudder deflection." },

{ q: "An aircraft's left wing is low in flight. To correct this using the left aileron trim tab, the cockpit trim control should be:", options: ["Moved up, causing the left aileron to move down", "Moved down, causing the left aileron to move down", "Moved down, causing the left aileron to move up", "Moved up, causing the left aileron to move up"], correct: 0, info: "Moving the trim tab up causes the aileron to deflect down, increasing lift on the left wing." },

{ q: "If an elevator trim tab moves downward, it is normally used to:", options: ["Counteract a tail-heavy condition", "Counteract a nose-heavy condition", "Reduce rudder forces", "Increase elevator sensitivity"], correct: 1, info: "A downward trim tab deflects the elevator upward, producing a nose-up pitching moment to relieve a nose-heavy condition." },

{ q: "The stall margin of an aircraft is primarily influenced by:", options: ["Engine Pressure Ratio (EPR)", "Speed bug setting", "Angle of attack and flap position", "Cabin pressure"], correct: 2, info: "Stall margin depends mainly on angle of attack and the configuration of high-lift devices such as flaps." },

{ q: "On aircraft fitted with dedicated speed brakes rather than spoilers, these are commonly located:", options: ["On the upper wing surface", "Either side of the fuselage", "On the horizontal stabiliser", "Inside the engine nacelles"], correct: 1, info: "Some aircraft, such as the BAe 146, use fuselage-mounted speed brakes." },

{ q: "If an aircraft encounters a rising gust while the trailing-edge flaps are lowered, the angle of attack will generally:", options: ["Decrease", "Remain unchanged", "Increase", "Become zero"], correct: 2, info: "A rising gust changes the relative airflow, increasing the wing's angle of attack." },

{ q: "Which device is specifically designed to dump lift after touchdown?", options: ["Leading-edge flap", "Trailing-edge flap", "Spoiler", "Wing fence"], correct: 2, info: "Spoilers destroy lift after landing, transferring more weight to the landing gear for effective braking." },

{ q: "What is the primary purpose of a fixed slot in a wing?", options: ["To house the slat when retracted", "To increase fuel efficiency during cruise", "To accelerate airflow and re-energise the boundary layer", "To reduce parasite drag"], correct: 2, info: "A slot accelerates airflow over the upper surface, delaying boundary layer separation and increasing the maximum lift coefficient." },

{ q: "What is the collective term for the fin, rudder and other side surfaces located aft of the centre of gravity that contribute to directional stability?", options: ["Empennage", "Effective keel surface", "Horizontal stabiliser", "Fuselage datum"], correct: 1, info: "The effective keel surface consists of the side area behind the centre of gravity that produces a restoring yawing moment during a sideslip." },

{ q: "Why may the angle of incidence be reduced progressively towards the wingtip?", options: ["To increase adverse yaw", "To prevent all spanwise airflow", "To retain aileron effectiveness at high angles of attack", "To make the wingtip stall before the root"], correct: 2, info: "Reducing the angle of incidence towards the wingtip is called washout. It encourages the wing root to stall first, helping the ailerons remain effective." },

{ q: "According to Bernoulli's principle, when airflow velocity increases, static pressure will:", options: ["Increase", "Decrease", "Remain unchanged", "Become equal to total pressure"], correct: 1, info: "For subsonic airflow, an increase in velocity is accompanied by a decrease in static pressure." },

{ q: "What is a typical effect of low wing loading?", options: ["Higher stall speed and a longer landing run", "Lower stall speed and a shorter landing run", "Higher landing speed with improved manoeuvrability", "No effect on stall or landing speed"], correct: 1, info: "Low wing loading means less aircraft weight is supported by each unit of wing area, resulting in lower stall and landing speeds." },

{ q: "If the angle of attack of an aerofoil is increased slightly below the stall angle, the centre of pressure generally:", options: ["Moves towards the leading edge", "Moves towards the wingtip", "Remains fixed", "Moves towards the trailing edge"], correct: 0, info: "On a conventional cambered aerofoil, the centre of pressure generally moves forward as angle of attack increases, until the stall is reached." },

{ q: "The term 'wing setting angle' normally refers to the:", options: ["Angle of attack", "Angle of dihedral", "Angle of incidence", "Angle of sweep"], correct: 2, info: "The wing setting angle is the fixed angle between the wing chord line and the aircraft longitudinal datum, known as the angle of incidence." },

{ q: "When does the angle of incidence of a conventionally fixed wing change?", options: ["When the aircraft climbs", "When the aircraft attitude changes", "When airspeed changes", "It does not normally change in flight"], correct: 3, info: "Angle of incidence is a fixed rigging angle between the chord line and the aircraft longitudinal datum." },

{ q: "As the angle of attack of a conventional cambered aerofoil decreases, the centre of pressure generally:", options: ["Moves forward", "Moves rearwards", "Moves towards the wingtip", "Remains at the centre of gravity"], correct: 1, info: "The centre of pressure generally moves rearwards as angle of attack decreases." },

{ q: "On a conventional cambered aerofoil producing positive lift, which surface normally contributes the greater proportion of the total lift?", options: ["The lower surface", "The upper surface", "Both surfaces always contribute equally", "The trailing edge only"], correct: 1, info: "The pressure reduction over the upper surface normally contributes the greater share of the total lift, although the exact proportion varies with aerofoil shape and flight condition." },

{ q: "For an aircraft of constant weight and configuration flying at a constant indicated airspeed, an increase in altitude will cause induced drag force to:", options: ["Increase substantially", "Decrease substantially", "Remain approximately unchanged", "Become equal to profile drag"], correct: 2, info: "At constant IAS, dynamic pressure remains approximately constant. The lift coefficient required to support the same weight therefore remains approximately unchanged, so induced drag force also remains approximately unchanged." },

{ q: "What is the name of the thin layer of air immediately adjacent to the surface of an aerofoil that moves more slowly due to skin friction?", options: ["Camber layer", "Boundary layer", "Pressure layer", "Viscous layer"], correct: 1, info: "The boundary layer is the thin layer of airflow immediately adjacent to the aircraft surface where velocity is reduced by friction." },

{ q: "Which surface finish helps reduce skin-friction drag and airflow turbulence?", options: ["Raised rivet heads", "Flush (countersunk) rivets", "Rough paint finish", "External reinforcing strips"], correct: 1, info: "Flush rivets minimise airflow disturbance and reduce skin-friction drag compared with protruding-head rivets." },

{ q: "If the centre of gravity were located aft of the centre of pressure, an increase in lift would tend to:", options: ["Reduce the angle of attack", "Create a nose-up pitching moment that further increases lift", "Reduce induced drag", "Improve longitudinal stability"], correct: 1, info: "With the CG behind the centre of pressure, increased lift produces a nose-up moment, reducing longitudinal stability." },

{ q: "Compared with the lower surface, the upper surface of a conventional cambered wing normally:", options: ["Produces less lift", "Produces approximately the same lift", "Produces the greater proportion of the total lift", "Produces no lift"], correct: 2, info: "Most of the lift on a conventional aerofoil results from the reduced pressure over the upper surface." },

{ q: "What effect does a forward centre of gravity generally have during landing?", options: ["Reduces the stall speed", "Increases the stall speed", "Has no effect on the stall speed", "Reduces induced drag"], correct: 1, info: "A forward CG requires greater tail download, increasing wing loading and therefore increasing stall speed." },

{ q: "Aft movement of the centre of gravity generally has what effect on longitudinal stability?", options: ["Increases stability", "Has no effect", "Reduces stability", "Eliminates the need for tailplane lift"], correct: 2, info: "Moving the CG aft reduces the restoring pitching moment, making the aircraft less longitudinally stable." },

{ q: "Which type of drag is directly caused by the production of lift?", options: ["Profile drag", "Interference drag", "Induced drag", "Skin-friction drag"], correct: 2, info: "Induced drag is an unavoidable consequence of lift generation and wingtip vortices." },

{ q: "Boundary layer separation most commonly occurs when:", options: ["The airflow encounters an adverse pressure gradient", "The airspeed is very high", "The wing loading decreases", "Static pressure becomes zero"], correct: 0, info: "An adverse pressure gradient slows the boundary layer until it can no longer remain attached to the surface." },

{ q: "Which condition is most likely to delay boundary layer separation?", options: ["A turbulent boundary layer with greater energy", "A perfectly laminar boundary layer", "A rough leading edge", "Ice contamination"], correct: 0, info: "A turbulent boundary layer has greater kinetic energy and is better able to resist an adverse pressure gradient." },

{ q: "The primary reason for maintaining a smooth wing surface is to:", options: ["Increase aircraft weight", "Reduce skin-friction drag and delay airflow separation", "Increase induced drag", "Reduce the angle of incidence"], correct: 1, info: "A smooth aerodynamic surface reduces drag and helps maintain attached airflow over the wing." },

{ q: "What is the primary purpose of a slot fitted to a wing?", options: ["To increase wing loading", "To reinforce and re-energise the boundary layer", "To reduce the wing area", "To decrease lift during landing"], correct: 1, info: "A slot directs high-energy air from the lower surface over the upper surface, re-energising the boundary layer and delaying airflow separation." },

{ q: "Angle of attack is the angle between the:", options: ["Chord line and aircraft longitudinal axis", "Chord line and relative airflow", "Wing incidence and the horizon", "Relative airflow and the vertical axis"], correct: 1, info: "Angle of attack is the angle between the aerofoil chord line and the relative airflow." },

{ q: "High-lift devices are primarily used during:", options: ["Cruise flight only", "Take-off and landing", "High-speed descent", "Aerobatic manoeuvres"], correct: 1, info: "High-lift devices increase lift at low airspeeds, making them useful during take-off and landing." },

{ q: "On many aircraft, spoilers are interconnected with which primary flight control?", options: ["Elevator", "Aileron", "Rudder", "Flaps"], correct: 1, info: "Spoilers are commonly linked to the ailerons to improve roll performance. These are often referred to as spoilerons." },

{ q: "What is meant by 'aileron droop'?", options: ["Both ailerons deflect downward together to increase lift", "One aileron remains permanently lowered", "The ailerons sag when hydraulic pressure is removed", "The leading edge of each aileron is presented to the airflow"], correct: 0, info: "Aileron droop is a system where both ailerons deflect downward together, acting as auxiliary flaps while still providing roll control." },

{ q: "Approximately what proportion of the Earth's atmosphere is oxygen?", options: ["10%", "21%", "40%", "78%"], correct: 1, info: "The Earth's atmosphere is approximately 78% nitrogen, 21% oxygen and 1% other gases." },

{ q: "What is the primary purpose of an anti-balance (anti-servo) tab?", options: ["To trim the aircraft", "To reduce control forces", "To increase control feel by resisting control surface movement", "To prevent flutter"], correct: 2, info: "An anti-balance (anti-servo) tab moves in the same direction as the control surface, increasing the force required to move it and improving control feel." },

{ q: "The fin primarily provides:", options: ["Longitudinal stability about the lateral axis", "Directional stability about the normal (yaw) axis", "Lateral stability about the longitudinal axis", "Pitch control during landing"], correct: 1, info: "The fin provides directional (yaw) stability by resisting unwanted yawing motions." },

{ q: "Which axis is associated with yaw motion?", options: ["Longitudinal axis", "Lateral axis", "Normal (vertical) axis", "Thrust axis"], correct: 2, info: "Yaw is rotation about the aircraft's normal (vertical) axis and is controlled by the rudder." },

{ q: "What is the primary function of the rudder?", options: ["Control pitch", "Control roll", "Control yaw about the normal axis", "Increase lift during take-off"], correct: 2, info: "The rudder controls yaw by producing a side force on the vertical tail." },

{ q: "If the weight of an aircraft is increased while maintaining the same airspeed, induced drag will:", options: ["Increase", "Decrease", "Remain unchanged", "Reduce to zero"], correct: 0, info: "At a given airspeed, a heavier aircraft must fly at a higher angle of attack to generate more lift. This increases induced drag." },

{ q: "When the flaps are lowered, the resultant lift vector generally:", options: ["Moves forward", "Moves rearward", "Remains unchanged", "Moves vertically downward"], correct: 1, info: "Lowering the flaps changes the pressure distribution over the wing, moving the resultant aerodynamic force rearwards and creating a nose-down pitching tendency on many aircraft." },

{ q: "For a typical take-off flap setting, the aerodynamic effect is:", options: ["A large increase in lift and a small increase in drag", "A large increase in lift and drag", "A small increase in lift and drag", "A decrease in lift and an increase in drag"], correct: 0, info: "Take-off flap settings are selected to provide a significant increase in lift while minimising the drag penalty." },

{ q: "Wing spoilers may be used to:", options: ["Increase cruise lift", "Act as ground spoilers after landing", "Replace the rudder during flight", "Reduce engine thrust"], correct: 1, info: "Ground spoilers destroy lift after touchdown, transferring more weight onto the landing gear and improving braking effectiveness." },

{ q: "The primary purpose of differential ailerons is to:", options: ["Increase pitch stability", "Reduce adverse yaw", "Increase lift during take-off", "Reduce induced drag"], correct: 1, info: "Differential ailerons reduce adverse yaw by allowing the upward-moving aileron to deflect further than the downward-moving aileron." },

{ q: "Dutch Roll is an oscillation involving which two aircraft motions?", options: ["Pitch and roll", "Pitch and yaw", "Yaw and roll", "Roll and heave"], correct: 2, info: "Dutch Roll is a coupled oscillation involving yaw and roll, commonly associated with swept-wing aircraft." },

{ q: "Which of the following are the primary flight control surfaces?", options: ["Elevators, roll spoilers and tabs", "Elevators, ailerons and rudder", "Flaps, slats and spoilers", "Elevators, flaps and rudder"], correct: 1, info: "The primary flight controls are the elevators, ailerons and rudder, which control pitch, roll and yaw respectively." },

{ q: "Which flight control surface primarily controls pitch?", options: ["Rudder", "Elevator", "Aileron", "Spoiler"], correct: 1, info: "The elevator controls aircraft movement about the lateral axis, producing pitch changes." },

{ q: "Which flight control surface primarily controls roll?", options: ["Elevator", "Spoiler", "Aileron", "Rudder"], correct: 2, info: "Ailerons control roll by changing lift on each wing." },

{ q: "Which flight control surface primarily controls yaw?", options: ["Spoiler", "Elevator", "Trim tab", "Rudder"], correct: 3, info: "The rudder controls yaw by producing a side force on the vertical stabiliser." },

{ q: "What is the primary purpose of servo tabs fitted to large control surfaces?", options: ["To increase aerodynamic drag", "To reduce the pilot's control forces", "To increase aircraft stability", "To prevent flutter"], correct: 1, info: "Servo tabs use aerodynamic forces to help move the main control surface, reducing the force required by the pilot." },

{ q: "A balance tab normally moves:", options: ["In the same direction as the control surface", "In the opposite direction to the control surface", "Only when the autopilot is engaged", "Only during landing"], correct: 1, info: "A balance tab deflects opposite to the control surface to reduce control forces." },

{ q: "An anti-balance (anti-servo) tab moves:", options: ["In the same direction as the control surface", "In the opposite direction to the control surface", "Only when trimming", "Independently of the control surface"], correct: 0, info: "An anti-servo tab moves in the same direction as the control surface, increasing the control force and improving feel." },

{ q: "The primary purpose of aerodynamic balancing is to:", options: ["Increase lift", "Reduce control forces", "Reduce induced drag", "Increase stall speed"], correct: 1, info: "Aerodynamic balancing reduces the effort required to move a control surface." },

{ q: "Mass balancing of a control surface is primarily intended to prevent:", options: ["Adverse yaw", "Flutter", "Dutch roll", "Compressibility buffet"], correct: 1, info: "Mass balancing moves the centre of mass forward of the hinge line to reduce the risk of flutter." },

{ q: "Which type of balance is achieved by placing weights ahead of the control surface hinge line?", options: ["Aerodynamic balance", "Mass balance", "Static balance", "Dynamic balance"], correct: 1, info: "Mass balance weights reduce the tendency for control surface flutter." },

{ q: "Flutter is best described as:", options: ["A slow rolling motion", "A self-excited structural vibration", "A form of adverse yaw", "A stall warning vibration"], correct: 1, info: "Flutter is a potentially destructive oscillation caused by interaction between aerodynamic, structural and inertial forces." },

{ q: "If a control surface is incorrectly mass balanced, the aircraft is most at risk of:", options: ["Increased lift", "Flutter", "Reduced induced drag", "Lower stall speed"], correct: 1, info: "Incorrect mass balancing can allow flutter to develop within the aircraft's operating speed range." },

{ q: "Which statement about trim tabs is correct?", options: ["They are primary flight controls", "They reduce the continuous control force required by the pilot", "They increase the maximum lift coefficient", "They prevent boundary layer separation"], correct: 1, info: "Trim tabs allow the aircraft to be trimmed so the pilot does not need to maintain constant control pressure." },

{ q: "Why are trim tabs used during prolonged flight?", options: ["To increase manoeuvrability", "To reduce pilot workload by maintaining the desired control position", "To reduce drag during take-off", "To increase control surface travel"], correct: 1, info: "Trim tabs hold the control surface in the required position, reducing pilot fatigue on long flights." },

{ q: "The angle between an aerofoil's chord line and the relative airflow is known as:", options: ["Angle of incidence", "Angle of attack", "Angle of dihedral", "Angle of sweep"], correct: 1, info: "The angle of attack is the angle between the chord line and the relative airflow." },

{ q: "The imaginary straight line joining the leading edge to the trailing edge of an aerofoil is called the:", options: ["Mean camber line", "Chord line", "Centre line", "Pressure line"], correct: 1, info: "The chord line is the straight line joining the leading and trailing edges of an aerofoil." },

{ q: "The angle between the wing chord line and the aircraft longitudinal axis is known as the:", options: ["Angle of attack", "Angle of dihedral", "Angle of incidence", "Angle of sweep"], correct: 2, info: "The angle of incidence is the fixed angle between the wing chord line and the aircraft longitudinal axis." },

{ q: "Wingtip vortices are the primary cause of:", options: ["Profile drag", "Form drag", "Induced drag", "Interference drag"], correct: 2, info: "Wingtip vortices are generated whenever lift is produced and are responsible for induced drag." },

{ q: "The camber of an aerofoil is defined as:", options: ["The thickness of the aerofoil", "The curvature of the mean camber (median) line", "The angle of incidence", "The distance between the leading and trailing edges"], correct: 1, info: "Camber is the curvature of the mean camber line of the aerofoil." },

{ q: "Induced drag is best described as drag that:", options: ["Is caused by skin friction", "Results from lift generation and wingtip vortices", "Is produced only at high Mach numbers", "Is independent of angle of attack"], correct: 1, info: "Induced drag is lift-dependent drag created by pressure differences around the wing and the resulting wingtip vortices." },

{ q: "As airflow passes over the upper surface of a cambered aerofoil, the airflow velocity generally:", options: ["Decreases while pressure increases", "Increases while pressure decreases", "Remains constant", "Increases while pressure also increases"], correct: 1, info: "According to Bernoulli's principle, increasing airflow velocity is accompanied by a reduction in static pressure." },

{ q: "Which force acts vertically downward towards the centre of the Earth?", options: ["Lift", "Drag", "Thrust", "Weight"], correct: 3, info: "Weight is the gravitational force acting vertically downward through the aircraft's centre of gravity." },

{ q: "The angle of attack of an aerofoil is measured relative to the:", options: ["Aircraft longitudinal axis", "Relative airflow", "Horizontal plane", "Vertical axis"], correct: 1, info: "Angle of attack is always measured between the chord line and the relative airflow, not the aircraft attitude." },

{ q: "The chord line of an aerofoil is an imaginary straight line joining the:", options: ["Wing root and wingtip", "Leading edge and trailing edge", "Upper and lower surfaces", "Centre of pressure and centre of gravity"], correct: 1, info: "The chord line is the straight reference line used for defining angle of attack and angle of incidence." },

{ q: "Which condition will increase the lift produced by an aerofoil if all other factors remain constant?", options: ["Increasing air density", "Reducing wing area", "Reducing airspeed", "Reducing the lift coefficient"], correct: 0, info: "Lift is directly proportional to air density. Denser air allows the wing to generate more lift." },

{ q: "All of the following affect the lift produced by an aerofoil EXCEPT:", options: ["Angle of attack", "Wing area", "Air density", "Engine oil pressure"], correct: 3, info: "Lift depends on the lift coefficient (including angle of attack), air density, velocity and wing area. Engine oil pressure has no direct effect." },

{ q: "A wing section intended for high-speed flight is generally:", options: ["Thick with a high camber", "Thin with little or no camber", "Thick with a large leading-edge radius", "Highly cambered with a blunt trailing edge"], correct: 1, info: "High-speed wings are generally thin with little camber to delay compressibility effects and reduce drag." },

{ q: "As aircraft speed increases in straight and level flight, induced drag generally:", options: ["Increases", "Decreases", "Remains constant", "Becomes greater than parasite drag"], correct: 1, info: "Increasing speed reduces the angle of attack required to maintain lift, decreasing induced drag." },

{ q: "As aircraft speed increases, profile (parasite) drag:", options: ["Decreases", "Remains constant", "Increases", "Becomes zero"], correct: 2, info: "Profile (parasite) drag increases approximately with the square of airspeed." },

{ q: "The stagnation point on an aerofoil is the point where:", options: ["Boundary layer separation begins", "Static pressure becomes zero", "The airflow is brought to rest", "Lift is greatest"], correct: 2, info: "The stagnation point is where the airflow velocity reduces to zero before dividing around the aerofoil." },

{ q: "An aerofoil stalls when:", options: ["The airspeed becomes too low", "The critical angle of attack is exceeded", "The engine loses power", "The aircraft exceeds its service ceiling"], correct: 1, info: "A stall always occurs when the critical angle of attack is exceeded, regardless of airspeed." },

{ q: "Which engine type is generally the most fuel efficient for modern transport aircraft?", options: ["Turbojet", "Rocket engine", "Turbofan", "Ramjet"], correct: 2, info: "High-bypass turbofan engines provide excellent propulsive efficiency and lower fuel consumption." },

{ q: "If air density increases while all other variables remain constant, lift will:", options: ["Decrease", "Remain unchanged", "Increase", "Become independent of airspeed"], correct: 2, info: "Lift is directly proportional to air density according to the lift equation." },

{ q: "The lift equation shows that lift is directly proportional to:", options: ["Wing area, air density, lift coefficient and the square of airspeed", "Aircraft weight only", "Engine thrust only", "Atmospheric pressure only"], correct: 0, info: "Lift = CL × ½ρV²S. Lift depends on lift coefficient, air density, velocity squared and wing area." },

{ q: "According to the lift equation, if the airspeed doubles while all other variables remain constant, lift will:", options: ["Double", "Triple", "Quadruple", "Remain unchanged"], correct: 2, info: "Lift is proportional to the square of the airspeed. Doubling the airspeed increases lift by four times." },

{ q: "If the wing area of an aircraft is increased while all other factors remain constant, lift will:", options: ["Decrease", "Remain unchanged", "Increase", "Become independent of airspeed"], correct: 2, info: "Lift is directly proportional to wing plan area." },

{ q: "The lift coefficient (CL) primarily depends upon:", options: ["Aircraft weight", "Wing shape and angle of attack", "Engine thrust", "Atmospheric pressure only"], correct: 1, info: "The lift coefficient is determined mainly by the aerofoil shape and its angle of attack." },

{ q: "Dynamic pressure is given by the expression:", options: ["ρV", "½ρV²", "ρ²V", "½V"], correct: 1, info: "Dynamic pressure is equal to one-half multiplied by air density multiplied by velocity squared." },

{ q: "If airspeed increases by 50% while all other variables remain constant, dynamic pressure will:", options: ["Increase by 25%", "Increase by 50%", "Increase by 125%", "Double"], correct: 2, info: "Dynamic pressure varies with the square of velocity. 1.5² = 2.25, giving a 125% increase." },

{ q: "The aerodynamic force acting on a wing can be resolved into:", options: ["Weight and thrust", "Lift and drag", "Pitch and roll", "Static and dynamic pressure"], correct: 1, info: "The resultant aerodynamic force is resolved into lift, perpendicular to the airflow, and drag, parallel to it." },

{ q: "The centre of pressure is defined as the point where:", options: ["The aircraft weight acts", "The resultant aerodynamic force acts", "The engine thrust acts", "The centre of gravity is located"], correct: 1, info: "The centre of pressure is the point through which the resultant aerodynamic force acts." },

{ q: "As the angle of attack increases up to the critical angle, the lift coefficient normally:", options: ["Decreases steadily", "Remains constant", "Increases to a maximum", "Becomes negative"], correct: 2, info: "CL increases with angle of attack until CLmax is reached at the critical angle." },

{ q: "Immediately after the critical angle of attack is exceeded, the lift coefficient:", options: ["Continues increasing", "Drops rapidly", "Remains constant", "Becomes equal to the drag coefficient"], correct: 1, info: "Flow separation causes the lift coefficient to decrease rapidly after CLmax." },

{ q: "For maximum aerodynamic efficiency, an aircraft should be flown at the angle of attack corresponding to:", options: ["Maximum drag", "Maximum lift-to-drag ratio", "Minimum lift coefficient", "Maximum stall margin"], correct: 1, info: "Maximum L/D provides the greatest aerodynamic efficiency and best glide performance." },

{ q: "When an aircraft stalls, what happens to lift and drag?", options: ["Lift increases and drag decreases", "Lift and drag both increase", "Lift decreases and drag increases", "Lift and drag both decrease"], correct: 2, info: "When the wing stalls, airflow separates from the upper surface, causing lift to decrease rapidly while drag increases." },

{ q: "Spoiler panels are normally positioned so that, when deployed symmetrically, they:", options: ["Cause the aircraft to roll", "Minimise changes to pitch trim", "Produce a yawing moment", "Increase engine thrust"], correct: 1, info: "Spoilers are positioned to minimise undesirable pitching moments while reducing lift and increasing drag." },

{ q: "The stalling speed of an aircraft will:", options: ["Only change if the maximum take-off weight changes", "Remain unaffected by aircraft weight", "Increase as aircraft weight increases", "Decrease as aircraft weight increases"], correct: 2, info: "A heavier aircraft requires more lift to maintain level flight, increasing the stalling speed." },

{ q: "During a level banked turn:", options: ["Extra lift is not required if thrust is increased", "Extra lift is not required", "Extra lift is required", "Only additional thrust is required"], correct: 2, info: "Part of the lift is used to provide the centripetal force, so total lift must increase to maintain altitude." },

{ q: "Mass balancing of a control surface is achieved by:", options: ["Fitting bias strips to the trailing edge", "Attaching balance weights forward of the hinge line", "Allowing the leading edge to project into the airflow", "Installing trim tabs"], correct: 1, info: "Mass balance weights are installed ahead of the hinge line to reduce the risk of flutter." },

{ q: "Control surface flutter may be caused by:", options: ["Excessive play in trim-tab or control-surface attachments", "High static friction in the trim-tab linkage", "Small trim-tab deflections", "Low airspeed"], correct: 0, info: "Free play in hinges or trim-tab attachments can allow flutter to develop." },

{ q: "A differential aileron system reduces adverse yaw because:", options: ["The downward-deflecting aileron moves further than the upward one", "The upward-deflecting aileron moves further than the downward one", "Both ailerons move equally", "The rudder automatically compensates for yaw"], correct: 1, info: "Differential ailerons reduce drag on the downgoing wing by limiting its downward deflection." },

{ q: "The primary function of a flap is to:", options: ["Trim the aircraft longitudinally", "Alter the position of the centre of gravity", "Increase the lift produced by the wing", "Provide roll control"], correct: 2, info: "Flaps increase wing camber, increasing lift at low airspeeds while also increasing drag." },

{ q: "The critical angle of attack at which a wing stalls can be delayed by:", options: ["Using flaps and slats", "Increasing aircraft weight", "Reducing engine power", "Moving the centre of gravity forward"], correct: 0, info: "High-lift devices such as flaps and slats delay airflow separation and increase the maximum usable angle of attack." },

{ q: "Compared with a lighter aircraft in the same configuration, a heavier aircraft will:", options: ["Have a lower stalling speed", "Have the same stalling speed", "Have a higher stalling speed", "Always stall at a lower angle of attack"], correct: 2, info: "A heavier aircraft requires more lift and therefore stalls at a higher airspeed, although the critical angle of attack remains essentially unchanged." },

{ q: "Profile drag is made up of which three drag components?", options: ["Form drag, induced drag and interference drag", "Form drag, skin-friction drag and interference drag", "Induced drag, wave drag and form drag", "Skin-friction drag, wave drag and induced drag"], correct: 1, info: "Profile drag consists of form drag, skin-friction drag and interference drag." },

{ q: "In straight and level unaccelerated flight, the aircraft is subjected to a load factor of:", options: ["0 g", "0.5 g", "1 g", "2 g"], correct: 2, info: "In steady straight and level flight, lift equals weight, producing a load factor of 1 g." },

{ q: "Which expression correctly represents aspect ratio?", options: ["Mean Chord ÷ Span", "Span² ÷ Wing Area", "Wing Area ÷ Span²", "Span ÷ Wing Area"], correct: 1, info: "Aspect ratio is calculated as span squared divided by wing area. For a rectangular wing, it is also equal to span divided by mean chord." },

{ q: "An aircraft wing with an aspect ratio of 8 means that the:", options: ["Wing area is eight times the span", "Span is eight times the mean chord", "Mean chord is eight times the span", "Wing loading equals 8"], correct: 1, info: "For a rectangular wing, aspect ratio equals span divided by mean chord." },

{ q: "Compared with a low aspect ratio wing, a high aspect ratio wing generally:", options: ["Produces more induced drag", "Produces less induced drag", "Has a lower lift-to-drag ratio", "Stalls at a much higher angle of attack"], correct: 1, info: "Long, slender wings produce weaker wingtip vortices and therefore less induced drag." },

{ q: "Induced downwash has what effect on the wing's effective angle of attack?", options: ["It increases the effective angle of attack", "It reduces the effective angle of attack", "It has no effect on angle of attack", "It only affects swept wings"], correct: 1, info: "Downwash changes the direction of the relative airflow, reducing the effective angle of attack." },

{ q: "On a straight rectangular wing with no geometric twist, the effective angle of attack near the wingtip is generally:", options: ["Greater than at the wing root", "Approximately zero", "Less than at the wing root because of induced downwash", "Identical to the geometric angle of attack"], correct: 2, info: "Although the geometric incidence is constant, greater downwash near the wingtip reduces the effective angle of attack." },

{ q: "Two rectangular wings have dimensions of 12 m span × 2 m chord and 6 m span × 1 m chord. Their aspect ratios are:", options: ["The first is higher", "The second is higher", "They are the same", "They cannot be compared without wing loading"], correct: 2, info: "Aspect ratio equals span divided by chord for rectangular wings. Both wings have an aspect ratio of 6." },

{ q: "During normal flight, the most common reason for the aircraft centre of gravity to change is:", options: ["Passenger movement", "Fuel and oil consumption", "Cargo shifting", "Extension of the landing gear"], correct: 1, info: "The gradual consumption of fuel and oil changes the aircraft's centre of gravity during flight." },

{ q: "A straight rectangular wing without twist will normally stall first at the:", options: ["Wingtip", "Mid-span", "Wing root", "Trailing edge"], correct: 2, info: "Greater induced downwash near the wingtip reduces its effective angle of attack, causing the wing root to reach the critical angle first." },

{ q: "The pressure measured at the stagnation point is:", options: ["Static pressure only", "Dynamic pressure only", "Total pressure (static pressure + dynamic pressure)", "Atmospheric pressure only"], correct: 2, info: "At the stagnation point the airflow velocity is reduced to zero, so the pressure equals the total pressure (static plus dynamic)." },

{ q: "On a swept-wing aircraft, the boundary layer on the upper surface tends to move:", options: ["Towards the wing root", "Towards the wingtip", "Directly from leading edge to trailing edge", "Vertically away from the wing"], correct: 1, info: "Spanwise flow causes the boundary layer to migrate towards the wingtip, increasing the likelihood of tip stall." },

{ q: "During straight and level flight, increasing airspeed causes profile drag to:", options: ["Decrease", "Remain constant", "Increase", "Become equal to induced drag"], correct: 2, info: "Profile (parasite) drag increases approximately with the square of airspeed." },

{ q: "If a swept wing stalls at the tips first, the aircraft will tend to:", options: ["Pitch nose up", "Pitch nose down", "Remain level", "Yaw only"], correct: 0, info: "Loss of lift behind the centre of gravity creates a nose-up pitching moment on many swept-wing aircraft." },

{ q: "The ratio of wing thickness to chord is commonly known as the:", options: ["Aspect ratio", "Mean chord ratio", "Fineness ratio", "Lift ratio"], correct: 2, info: "The thickness-to-chord ratio is commonly referred to as the fineness ratio." },

{ q: "As a rearward-swept wing flexes upward in flight, the effective angle of attack generally:", options: ["Increases", "Decreases", "Remains unchanged", "Becomes negative"], correct: 1, info: "Wing flexure reduces the effective angle of attack on a rearward-swept wing, reducing lift and limiting further flexure." },

{ q: "A high aspect ratio wing is characterised by:", options: ["Short span and long chord", "Long span and short chord", "Short span and short chord", "Long span and long chord"], correct: 1, info: "High aspect ratio wings are long and slender, reducing induced drag." },

{ q: "Why is it preferable for a wing to stall first at the root?", options: ["It gives aerodynamic buffet warning before full stall", "It increases cruise speed", "It reduces induced drag", "It improves fuel economy"], correct: 0, info: "Root-first stall produces buffet over the tailplane and leaves the ailerons effective for longer." },

{ q: "What aerodynamic design feature is commonly used to ensure the wing root stalls before the wingtip?", options: ["Wing washout", "Wing sweep", "Increased wing loading", "Reduced dihedral"], correct: 0, info: "Washout reduces the angle of incidence at the wingtip, delaying tip stall." },

{ q: "Which statement about wingtip stall is correct?", options: ["It generally preserves aileron effectiveness", "It reduces the likelihood of a wing drop", "It can result in reduced roll control due to loss of aileron effectiveness", "It always occurs before root stall on straight wings"], correct: 2, info: "If the wingtip stalls first, the ailerons become ineffective, making roll control difficult." },

{ q: "As speed increases during straight and level flight:", options: ["Induced drag increases", "Profile drag increases", "Profile drag remains constant", "Induced and profile drag remain constant"], correct: 1, info: "Profile (parasite) drag increases approximately with the square of airspeed, while induced drag decreases." },

{ q: "The thickness-to-chord ratio of a wing is commonly referred to as the:", options: ["Aspect ratio", "Mean chord ratio", "Fineness ratio", "Camber ratio"], correct: 2, info: "The thickness-to-chord ratio is commonly known as the fineness ratio." },

{ q: "Upward flexure of a rearward-swept wing generally:", options: ["Increases lift and increases further flexure", "Increases lift but decreases flexure", "Decreases lift and therefore reduces further flexure", "Has no effect on lift"], correct: 2, info: "Flexure reduces the effective angle of attack on a swept wing, reducing lift and limiting additional bending." },

{ q: "Which design feature is commonly used to ensure the wing root stalls before the wingtip?", options: ["Wing washout", "Reduced wing span", "Increased dihedral", "Forward wing sweep"], correct: 0, info: "Washout reduces the angle of incidence towards the wingtip, delaying tip stall." },
