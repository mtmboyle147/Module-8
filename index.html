<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryanair AMC Phase 2 Mastery</title>
<style>
    :root {
        --theme: #22c55e;
        --theme-dark: #15803d;
        --theme-light: #dcfce7;

        --bg: #121212;
        --card: #1e1e1e;
        --card-alt: #2a2a2a;
        --text: #f5f5f5;
        --border: #444;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        line-height: 1.6;
        max-width: 800px;
        margin: 2rem auto;
        padding: 1rem;
        background: var(--bg);
        color: var(--text);
    }

    .quiz-container {
        background: var(--card);
        padding: 2rem;
        border-radius: 12px;
        border-top: 8px solid var(--theme);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .header-box {
        text-align: center;
        margin-bottom: 2rem;
    }

    .progress-bar {
        height: 10px;
        background: #333;
        border-radius: 5px;
        margin: 10px 0;
        overflow: hidden;
    }

    #progress-fill {
        height: 100%;
        width: 0%;
        background: var(--theme);
        transition: width 0.3s ease;
    }

    .question-text {
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 1.5rem;
        display: block;
    }

    .option {
        display: flex;
        align-items: center;
        padding: 12px;
        margin-bottom: 10px;
        background: var(--card-alt);
        border: 2px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        color: var(--text);
        transition: all .2s ease;
    }

    .option:hover {
        border-color: var(--theme);
        background: #1d3a28;
        transform: translateX(5px);
    }

    .option input {
        margin-right: 15px;
        transform: scale(1.2);
    }

    .feedback {
        margin: 1.5rem 0;
        padding: 1rem;
        border-radius: 6px;
        display: none;
        font-weight: bold;
        border-left: 5px solid;
    }

    .correct-msg {
        background: #173d25;
        color: #8cffb0;
        border-color: var(--theme);
    }

    .wrong-msg {
        background: #4a1d23;
        color: #ff9ea8;
        border-color: #ff4d4d;
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        margin-top: 10px;
        transition: all .2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        filter: brightness(110%);
    }

    #submit-btn {
        background: var(--theme);
        color: white;
    }

    #submit-btn:hover {
        background: var(--theme-dark);
    }

    #next-btn {
        background: var(--theme-dark);
        color: white;
        display: none;
    }

    #next-btn:hover {
        background: var(--theme);
    }

    #final-score {
        text-align: center;
        display: none;
    }

    #final-score button {
        background: var(--theme);
        color: white;
    }

    h1, h2 {
        color: var(--theme);
    }

    a {
        color: var(--theme);
    }

    hr {
        border: none;
        border-top: 1px solid var(--border);
    }
</style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="header-box">
            <h1>Module 8 Basic Aerodynamics Quiz</h1>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <p>Question <span id="current-num">1</span> of <span id="total-num">0</span></p>
        </div>

        <div id="question-area">
            <span class="question-text" id="q-text"></span>
            <div id="options-list"></div>
        </div>

        <div id="feedback-area" class="feedback"></div>
        <button id="submit-btn" onclick="checkAnswer()">Submit Answer</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question &rarr;</button>
    </div>

    <div id="final-score">
        <h2>Section Complete!</h2>
        <p style="font-size: 2rem;">Score: <span id="score-val">0</span> / <span id="total-final">0</span></p>
        <button onclick="location.reload()" style="background: var(--theme); color:white;">Restart Quiz</button>
    </div>
</div>

<script>
   
    const allQuestions = [
        
{ q: "What instrument is primarily used to measure air temperature?", options: ["Thermometer", "Barometer", "Hydrometer", "Anemometer"], correct: 0, info: "Air temperature is measured using a thermometer." },

{ q: "What instrument measures atmospheric pressure?", options: ["Hygrometer", "Barometer", "Altimeter", "Thermocouple"], correct: 1, info: "Atmospheric pressure is measured using a barometer." },

{ q: "Which SI unit is commonly used to express air pressure?", options: ["Newton", "Pascal", "Kelvin", "Joule"], correct: 1, info: "Pressure is measured in Pascals (Pa), although hPa or millibars are commonly used in aviation." },

{ q: "Which gas makes up the largest proportion of Earth's atmosphere?", options: ["Oxygen", "Nitrogen", "Argon", "Carbon Dioxide"], correct: 1, info: "Nitrogen makes up approximately 78% of Earth's atmosphere." },

{ q: "Approximately what percentage of the atmosphere is oxygen?", options: ["21%", "30%", "15%", "10%"], correct: 0, info: "Oxygen accounts for approximately 21% of the atmosphere." },

{ q: "Which atmospheric layer contains most weather phenomena?", options: ["Stratosphere", "Mesosphere", "Troposphere", "Thermosphere"], correct: 2, info: "Almost all weather occurs in the troposphere." },

{ q: "In which atmospheric layer is the ozone layer primarily found?", options: ["Troposphere", "Stratosphere", "Mesosphere", "Exosphere"], correct: 1, info: "The ozone layer is located within the stratosphere." },

{ q: "What is the standard sea level temperature in the ISA?", options: ["10°C", "15°C", "20°C", "25°C"], correct: 1, info: "The ISA assumes a sea level temperature of +15°C." },

{ q: "What is the ISA sea level pressure?", options: ["1000 hPa", "1013.2 hPa", "1025 hPa", "980 hPa"], correct: 1, info: "Standard sea level pressure is 1013.2 hPa." },

{ q: "What is the ISA sea level air density?", options: ["1.000 kg/m³", "1.225 kg/m³", "1.500 kg/m³", "0.950 kg/m³"], correct: 1, info: "ISA sea level density is 1.225 kg/m³." },

{ q: "At what approximate altitude does the tropopause occur?", options: ["5 km", "8 km", "11 km", "20 km"], correct: 2, info: "The ISA tropopause is located approximately 11 km above sea level." },

{ q: "What is the standard temperature at the tropopause?", options: ["−40°C", "−50°C", "−56.5°C", "−65°C"], correct: 2, info: "The tropopause temperature is approximately −56.5°C." },

{ q: "How does temperature change throughout the troposphere?", options: ["It increases steadily", "It remains constant", "It decreases uniformly", "It varies randomly"], correct: 2, info: "Temperature decreases uniformly in the troposphere." },

{ q: "What is the ISA lapse rate in the troposphere?", options: ["3°C/km", "6.5°C/km", "9.8°C/km", "12°C/km"], correct: 1, info: "The standard lapse rate is 6.5°C per kilometre." },

{ q: "How does atmospheric pressure change with increasing altitude?", options: ["It increases", "It remains constant", "It decreases non-linearly", "It changes randomly"], correct: 2, info: "Pressure decreases with altitude but not at a constant rate." },

{ q: "Approximately at what altitude has atmospheric pressure fallen to half its sea level value?", options: ["2 km", "5 km", "10 km", "15 km"], correct: 1, info: "Pressure is approximately half its sea level value at around 5 km altitude." },

{ q: "How does air density change with altitude?", options: ["It increases", "It remains constant", "It decreases", "It doubles"], correct: 2, info: "Air density decreases with increasing altitude." },

{ q: "At approximately what altitude is air density half its sea level value?", options: ["3 km", "6.6 km", "12 km", "18 km"], correct: 1, info: "Density falls to approximately half at around 6.6 km." },

{ q: "What happens to humidity as altitude increases?", options: ["It increases", "It remains constant", "It generally decreases", "It doubles"], correct: 2, info: "Humidity decreases significantly with altitude." },

{ q: "Why is cabin humidity controlled on modern aircraft?", options: ["To improve engine performance", "For passenger comfort", "To reduce drag", "To increase lift"], correct: 1, info: "Environmental control systems maintain suitable cabin humidity for passenger comfort." },

{ q: "What does the density ratio (σ) compare?", options: ["Current pressure to sea level pressure", "Altitude to temperature", "Density at altitude to ISA sea level density", "Weight to lift"], correct: 2, info: "Density ratio is the ratio of density at altitude to standard sea level density." },

{ q: "Which airspeed represents the aircraft's actual speed through the air?", options: ["IAS", "CAS", "EAS", "TAS"], correct: 3, info: "True Airspeed (TAS) is the aircraft's actual speed relative to the surrounding air." },

{ q: "Equivalent Airspeed (EAS) is corrected for which error?", options: ["Wind error", "Instrument and position errors", "Temperature error", "Altitude error"], correct: 1, info: "Equivalent Airspeed is the indicated airspeed corrected for instrument and position errors." },

{ q: "What is static pressure?", options: ["Pressure produced only by moving air", "Pressure exerted equally in all directions by still or moving air", "Pressure caused by engine thrust", "Pressure measured only inside a pitot tube"], correct: 1, info: "Static pressure is the ambient pressure exerted equally in all directions by the surrounding air." },

{ q: "Static pressure acts in which direction?", options: ["Only forwards", "Only upwards", "In all directions equally", "Only perpendicular to the wing"], correct: 2, info: "Static pressure acts equally in every direction." },

{ q: "Which flight instrument relies primarily on static pressure only?", options: ["Airspeed Indicator", "Altimeter", "Turn Coordinator", "Vertical Compass"], correct: 1, info: "The altimeter operates using only static pressure." },

{ q: "What happens to static pressure as altitude increases?", options: ["It increases", "It remains constant", "It decreases", "It doubles"], correct: 2, info: "Atmospheric pressure decreases with increasing altitude." },

{ q: "Dynamic pressure is created by:", options: ["Air temperature", "Aircraft motion through the air", "Humidity", "Gravity"], correct: 1, info: "Dynamic pressure exists because of the aircraft's movement through the air." },

{ q: "Dynamic pressure depends primarily upon:", options: ["Altitude only", "Aircraft weight", "Velocity of the airflow", "Engine power"], correct: 2, info: "Dynamic pressure increases with the square of airspeed." },

{ q: "If aircraft speed doubles, dynamic pressure becomes:", options: ["Twice as large", "Three times as large", "Four times as large", "Eight times as large"], correct: 2, info: "Dynamic pressure varies with velocity squared, so doubling speed increases it fourfold." },

{ q: "Total pressure is equal to:", options: ["Static pressure minus dynamic pressure", "Dynamic pressure only", "Static pressure plus dynamic pressure", "Pressure multiplied by density"], correct: 2, info: "Total pressure equals static pressure plus dynamic pressure." },

{ q: "Which instrument measures total pressure?", options: ["Altimeter", "Pitot tube", "Static vent", "Turn indicator"], correct: 1, info: "The pitot tube measures total pressure." },

{ q: "Which pressure source provides ambient atmospheric pressure?", options: ["Pitot tube", "Static port", "Fuel vent", "Cabin vent"], correct: 1, info: "The static port senses ambient atmospheric pressure." },

{ q: "Bernoulli's Principle states that as fluid velocity increases:", options: ["Pressure increases", "Density doubles", "Pressure decreases", "Temperature always rises"], correct: 2, info: "Bernoulli's Principle states that increased airflow velocity produces lower static pressure." },

{ q: "Lift generated by an aerofoil is partly explained by:", options: ["Newton's Third Law only", "Bernoulli's Principle", "Archimedes' Principle", "Pascal's Law"], correct: 1, info: "Bernoulli's Principle helps explain the pressure difference responsible for lift." },

{ q: "Where is airflow generally fastest over a wing?", options: ["Trailing edge", "Wing tip", "Upper surface", "Lower surface"], correct: 2, info: "Air accelerates over the upper surface, reducing pressure." },

{ q: "The lowest pressure around a lifting wing is normally found:", options: ["Under the wing", "Above the wing", "Behind the aircraft", "Inside the fuselage"], correct: 1, info: "The greatest airflow acceleration occurs over the upper surface." },

{ q: "Why does pressure decrease when airflow speeds up?", options: ["Energy is converted from pressure into kinetic energy", "Gravity decreases", "Density doubles", "The air becomes heavier"], correct: 0, info: "Bernoulli's Principle describes conservation of energy within flowing fluids." },

{ q: "What is meant by streamline flow?", options: ["Chaotic airflow", "Air moving in smooth parallel layers", "Air rotating behind the wing", "Airflow that is stationary"], correct: 1, info: "Streamline (laminar) flow consists of smooth, parallel airflow." },

{ q: "Laminar flow produces:", options: ["Low drag", "Maximum turbulence", "Shock waves", "Compressibility"], correct: 0, info: "Laminar airflow produces significantly less drag than turbulent flow." },

{ q: "Turbulent airflow is characterised by:", options: ["Smooth layers", "Random mixing and eddies", "Zero drag", "Constant velocity"], correct: 1, info: "Turbulent airflow contains swirling eddies and increased mixing." },

{ q: "Viscosity is the:", options: ["Weight of the air", "Internal friction between air molecules", "Pressure inside the wing", "Amount of oxygen in air"], correct: 1, info: "Viscosity describes the internal friction resisting fluid movement." },

{ q: "Because of viscosity, air immediately next to the wing surface:", options: ["Moves faster than free stream air", "Stops moving relative to the surface", "Creates lift directly", "Becomes supersonic"], correct: 1, info: "The no-slip condition causes airflow at the surface to have zero relative velocity." },

{ q: "What causes the boundary layer to form?", options: ["Humidity", "Viscosity", "Temperature", "Engine thrust"], correct: 1, info: "The boundary layer forms because viscosity slows the air next to the surface." },

{ q: "What is upwash?", options: ["Airflow deflected upward before reaching the wing", "Air behind the aircraft", "Air entering the engine", "Air beneath the fuselage"], correct: 0, info: "Upwash occurs ahead of the wing as approaching airflow is deflected upward." },

{ q: "What causes upwash?", options: ["Propeller slipstream", "Pressure field generated by the wing", "Landing gear", "Engine exhaust"], correct: 1, info: "The pressure distribution around the wing bends airflow upward before it reaches the aerofoil." },

{ q: "What is downwash?", options: ["Airflow deflected downward behind the wing", "Air beneath the fuselage", "Air entering the intake", "Air above the tail"], correct: 0, info: "Downwash is the downward deflection of airflow after passing over the wing." },

{ q: "Downwash is a direct consequence of:", options: ["Lift production", "Engine thrust", "Gyroscopic forces", "Fuel flow"], correct: 0, info: "The production of lift requires air to be deflected downward." },

{ q: "Which law is demonstrated by downwash?", options: ["Newton's Third Law", "Boyle's Law", "Hooke's Law", "Pascal's Law"], correct: 0, info: "The wing pushes air downward and receives an equal upward reaction force." },

{ q: "Which type of airflow produces the least drag?", options: ["Separated flow", "Turbulent flow", "Laminar flow", "Rotational flow"], correct: 2, info: "Laminar flow creates the lowest skin friction drag." },

{ q: "Why is turbulent airflow sometimes desirable?", options: ["It completely removes drag", "It delays boundary layer separation", "It eliminates lift", "It reduces aircraft weight"], correct: 1, info: "A turbulent boundary layer contains more energy and resists separation longer." },

{ q: "The pressure difference between the upper and lower wing surfaces is responsible for:", options: ["Weight", "Lift", "Drag", "Thrust"], correct: 1, info: "Lift results from the pressure differential across the aerofoil." },

{ q: "Which statement about airflow over an aerofoil is correct?", options: ["Upper airflow is always slower", "Lower airflow is always turbulent", "Upper airflow generally accelerates and pressure falls", "Both surfaces always have equal pressure"], correct: 2, info: "Air accelerates over the upper surface, producing lower pressure and lift." },

{ q: "What is the boundary layer?", options: ["A layer of fuel vapour around the wing", "A thin layer of air directly affected by surface friction", "The airflow above the aircraft", "The air inside the wing"], correct: 1, info: "The boundary layer is the thin layer of air immediately adjacent to the aircraft surface where viscosity affects airflow." },

{ q: "What causes the boundary layer to form?", options: ["Engine thrust", "Air density", "Viscosity", "Gravity"], correct: 2, info: "The boundary layer forms because of the viscosity of air acting against the aircraft surface." },

{ q: "Where is the airflow velocity lowest within the boundary layer?", options: ["At the outer edge", "At the wingtip", "Against the aircraft surface", "Halfway through the boundary layer"], correct: 2, info: "Air in contact with the surface has virtually zero velocity relative to the aircraft." },

{ q: "As airflow moves rearwards over a wing, the boundary layer generally:", options: ["Becomes thinner", "Disappears", "Becomes thicker", "Remains constant"], correct: 2, info: "The boundary layer grows in thickness as more air is slowed by friction." },

{ q: "Which type of boundary layer has the lowest skin friction drag?", options: ["Turbulent", "Separated", "Laminar", "Rotational"], correct: 2, info: "Laminar flow has the least skin friction drag." },

{ q: "Which type of boundary layer contains more energy?", options: ["Laminar", "Separated", "Turbulent", "Static"], correct: 2, info: "A turbulent boundary layer contains more kinetic energy than a laminar one." },

{ q: "Why is a turbulent boundary layer often preferred near the trailing edge?", options: ["It produces less lift", "It delays flow separation", "It reduces aircraft weight", "It eliminates induced drag"], correct: 1, info: "The additional energy allows turbulent flow to remain attached longer." },

{ q: "Boundary layer separation occurs when:", options: ["The airflow accelerates", "The airflow reverses direction and leaves the surface", "Pressure decreases continuously", "The aircraft exceeds Mach 1"], correct: 1, info: "Flow separation occurs when the boundary layer loses enough energy that it can no longer remain attached." },

{ q: "What is the main cause of boundary layer separation?", options: ["Favourable pressure gradient", "Adverse pressure gradient", "Low humidity", "High engine power"], correct: 1, info: "An adverse pressure gradient slows the airflow until separation occurs." },

{ q: "Boundary layer separation results in:", options: ["Reduced drag", "Reduced lift and increased drag", "Increased lift only", "Improved stability"], correct: 1, info: "Separated airflow significantly increases drag while reducing lift." },

{ q: "Flow separation normally begins near which part of the wing?", options: ["Leading edge", "Wing root", "Trailing edge", "Wingtip"], correct: 2, info: "Flow separation usually starts near the trailing edge and progresses forward." },

{ q: "What happens to lift as flow separation moves forward?", options: ["Lift increases", "Lift remains constant", "Lift decreases rapidly", "Lift doubles"], correct: 2, info: "Increasing separation destroys the pressure distribution that creates lift." },

{ q: "Which of the following is NOT a boundary layer control device?", options: ["Vortex generator", "Wing fence", "Pitot tube", "Slat"], correct: 2, info: "Pitot tubes measure pressure and do not control the boundary layer." },

{ q: "What is the purpose of vortex generators?", options: ["Increase aircraft weight", "Generate thrust", "Mix high-energy airflow into the boundary layer", "Reduce engine temperature"], correct: 2, info: "Vortex generators energise the boundary layer and delay separation." },

{ q: "Vortex generators delay:", options: ["Compressibility", "Boundary layer separation", "Fuel consumption", "Engine vibration"], correct: 1, info: "They create small vortices that keep airflow attached longer." },

{ q: "What is the primary purpose of wing fences?", options: ["Reduce spanwise airflow", "Increase engine thrust", "Reduce fuel consumption", "Strengthen the wing"], correct: 0, info: "Wing fences reduce spanwise airflow and delay wingtip stall." },

{ q: "Leading-edge slats improve aircraft performance by:", options: ["Reducing engine noise", "Increasing wing loading", "Delaying boundary layer separation", "Reducing aircraft weight"], correct: 2, info: "Slats energise airflow over the wing, delaying stall." },

{ q: "Boundary layer suction systems work by:", options: ["Adding compressed air", "Removing slow-moving air", "Cooling the wing", "Heating the wing"], correct: 1, info: "Suction removes the low-energy boundary layer before separation occurs." },

{ q: "Blown flaps improve lift by:", options: ["Reducing wing area", "Directing high-energy air over the flap surface", "Increasing aircraft mass", "Lowering engine thrust"], correct: 1, info: "Engine bleed air is directed over the flap to energise the airflow." },

{ q: "The angle of attack is defined as:", options: ["The angle between the wing chord and the horizon", "The angle between the chord line and the relative airflow", "The angle between the fuselage and the runway", "The wing incidence angle"], correct: 1, info: "Angle of attack is measured between the chord line and the relative airflow." },

{ q: "Increasing angle of attack generally causes lift to:", options: ["Decrease immediately", "Increase until the critical angle is reached", "Remain constant", "Become negative"], correct: 1, info: "Lift increases with angle of attack until the critical angle is exceeded." },

{ q: "The critical angle of attack is:", options: ["The highest angle before airflow separation causes a stall", "The aircraft climb angle", "The wing incidence angle", "The landing approach angle"], correct: 0, info: "Beyond the critical angle, lift decreases rapidly due to separation." },

{ q: "A wing stalls because:", options: ["Engine thrust is lost", "The critical angle of attack is exceeded", "The aircraft flies too slowly only", "The aircraft is too heavy"], correct: 1, info: "A stall always occurs when the critical angle of attack is exceeded." },

{ q: "Can an aircraft stall at any airspeed?", options: ["No", "Only below 60 knots", "Only during landing", "Yes"], correct: 3, info: "Any aircraft can stall at any airspeed if the critical angle of attack is exceeded." },

{ q: "At the stall, the coefficient of lift reaches:", options: ["Minimum drag", "Maximum lift coefficient (CLmax)", "Zero lift", "Maximum thrust"], correct: 1, info: "CLmax occurs immediately before the stall." },

{ q: "After CLmax is exceeded:", options: ["Lift continues increasing", "Lift decreases sharply", "Drag disappears", "Weight decreases"], correct: 1, info: "Flow separation causes lift to fall rapidly." },

{ q: "As angle of attack increases toward the stall, induced drag:", options: ["Decreases", "Remains constant", "Increases", "Becomes zero"], correct: 2, info: "Induced drag increases significantly at high angles of attack." },

{ q: "The first indication of an approaching stall is usually:", options: ["Engine failure", "Buffeting caused by airflow separation", "Loss of fuel pressure", "Landing gear vibration"], correct: 1, info: "Buffeting occurs as turbulent airflow develops ahead of the stall." },

{ q: "A stall warning system is designed to alert the pilot:", options: ["After the aircraft stalls", "Before the critical angle of attack is reached", "Only during landing", "When the engine overheats"], correct: 1, info: "Stall warning devices activate shortly before the stall occurs." },

{ q: "Which part of a straight wing is normally designed to stall first?", options: ["Wingtip", "Wing root", "Trailing edge", "Leading edge"], correct: 1, info: "Root-first stall helps maintain aileron effectiveness." },

{ q: "Why is wing-root stall preferred?", options: ["It improves fuel economy", "It preserves aileron control", "It reduces engine power", "It increases cruise speed"], correct: 1, info: "Keeping the wingtips flying maintains roll control during the stall." },

{ q: "Wing washout is used to:", options: ["Increase fuel capacity", "Reduce root lift", "Delay wingtip stall", "Increase aircraft weight"], correct: 2, info: "Washout lowers the angle of attack at the wingtip." },

{ q: "What is washout?", options: ["Twisting the wingtip to a lower angle of incidence", "Cleaning the wing surface", "Increasing wing thickness", "Adding slats"], correct: 0, info: "Washout ensures the wing root stalls before the tip." },

{ q: "Which control surface is most affected by wingtip stall?", options: ["Elevator", "Aileron", "Rudder", "Trim tab"], correct: 1, info: "Ailerons are located near the wingtip and lose effectiveness if the tip stalls." },

{ q: "What is the primary purpose of high-lift devices?", options: ["Increase cruise speed", "Increase lift at low airspeeds", "Reduce engine thrust", "Reduce aircraft weight"], correct: 1, info: "High-lift devices increase lift during take-off and landing." },

{ q: "High-lift devices are mainly used during:", options: ["Cruise only", "Take-off and landing", "High altitude flight only", "Engine start"], correct: 1, info: "High-lift devices are extended during take-off and landing to increase lift." },

{ q: "Deploying flaps primarily changes the wing's:", options: ["Weight", "Camber", "Thickness", "Span"], correct: 1, info: "Flaps increase wing camber, increasing lift." },

{ q: "Extending flaps generally causes lift to:", options: ["Decrease", "Increase", "Remain constant", "Become negative"], correct: 1, info: "Increasing wing camber produces greater lift." },

{ q: "Deploying flaps also causes:", options: ["Reduced drag", "Increased drag", "Reduced weight", "Reduced thrust"], correct: 1, info: "Flaps increase both lift and drag." },

{ q: "Why is additional drag useful during landing?", options: ["It increases cruise speed", "It helps slow the aircraft", "It reduces fuel consumption", "It improves engine cooling"], correct: 1, info: "Extra drag allows steeper approaches and shorter landing distances." },

{ q: "Which trailing-edge flap is simply hinged downward?", options: ["Fowler flap", "Split flap", "Plain flap", "Kruger flap"], correct: 2, info: "The plain flap is the simplest trailing-edge flap design." },

{ q: "A split flap consists of:", options: ["The entire trailing edge moving", "Only the lower trailing edge surface deflecting", "Only the upper surface moving", "A movable leading edge"], correct: 1, info: "Split flaps use only the lower portion of the trailing edge." },

{ q: "Compared with a plain flap, a split flap generally produces:", options: ["Less drag", "More drag", "No lift increase", "No drag increase"], correct: 1, info: "Split flaps generate substantial drag while increasing lift." },

{ q: "A slotted flap increases lift because:", options: ["It decreases wing area", "Air passes through the slot and energises the upper surface airflow", "It blocks airflow", "It increases aircraft weight"], correct: 1, info: "The slot supplies high-energy air to delay boundary layer separation." },

{ q: "The main advantage of a slotted flap is:", options: ["Reduced drag", "Delayed airflow separation", "Reduced weight", "Improved engine efficiency"], correct: 1, info: "High-energy airflow keeps the boundary layer attached longer." },

{ q: "The Fowler flap increases:", options: ["Camber only", "Wing area only", "Both camber and wing area", "Neither"], correct: 2, info: "Fowler flaps slide rearwards before lowering." },

{ q: "Which flap design generally provides the greatest lift increase?", options: ["Plain flap", "Split flap", "Fowler flap", "Spoiler"], correct: 2, info: "Fowler flaps provide the largest increase in lift due to increased camber and wing area." },

{ q: "Blown flaps operate by:", options: ["Heating the wing", "Using engine bleed air over the flap", "Increasing fuel pressure", "Reducing wing loading"], correct: 1, info: "Bleed air energises the airflow over the flap surface." },

{ q: "Engine bleed air used by blown flaps serves to:", options: ["Reduce lift", "Delay boundary layer separation", "Increase stall speed", "Decrease wing area"], correct: 1, info: "High-energy air delays separation and increases lift." },

{ q: "Leading-edge devices are primarily designed to:", options: ["Reduce lift", "Delay stall", "Increase aircraft weight", "Reduce fuel consumption"], correct: 1, info: "Leading-edge devices delay airflow separation at high angles of attack." },

{ q: "What is the speed of sound?", options: ["The speed of an aircraft at Mach 1", "The speed at which a small pressure disturbance travels through a fluid", "The maximum speed of airflow over a wing", "The speed of engine exhaust gases"], correct: 1, info: "The speed of sound is the speed at which a very small pressure disturbance propagates through a fluid." },

let quizPool = [];
    let currentIdx = 0;
    let score = 0;
    let currentCorrectIndex = null; // Track the new position of the correct answer

    function initializeQuiz() {
        // 1. Shuffle and pick 30 questions from the 220
        let shuffled = [...allQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        quizPool = shuffled.slice(0, 30);
        
        currentIdx = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        const qData = quizPool[currentIdx];
        
        // UI Updates
        document.getElementById("current-num").innerText = currentIdx + 1;
        document.getElementById("total-num").innerText = quizPool.length;
        document.getElementById("q-text").innerText = qData.q;
        document.getElementById("progress-fill").style.width = (currentIdx / quizPool.length * 100) + "%";
        
        // --- RANDOMIZE OPTIONS ---
        // Create an array of indices [0, 1, 2]
        let optionIndices = qData.options.map((_, index) => index);
        
        // Shuffle the indices
        for (let i = optionIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionIndices[i], optionIndices[j]] = [optionIndices[j], optionIndices[i]];
        }

        const list = document.getElementById("options-list");
        list.innerHTML = "";

        // Re-map the options based on the shuffled indices
        optionIndices.forEach((originalIndex, displayIndex) => {
            // Check if this specific option was the original correct one
            if (originalIndex === qData.correct) {
                currentCorrectIndex = displayIndex; 
            }

            const div = document.createElement("div");
            div.className = "option";
            div.innerHTML = `
                <input type="radio" name="answer" id="opt${displayIndex}" value="${displayIndex}">
                <label for="opt${displayIndex}">${qData.options[originalIndex]}</label>
            `;
            div.onclick = () => { document.getElementById(`opt${displayIndex}`).checked = true; };
            list.appendChild(div);
        });

        document.getElementById("feedback-area").style.display = "none";
        document.getElementById("submit-btn").style.display = "block";
        document.getElementById("next-btn").style.display = "none";
    }

    function checkAnswer() {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected) return alert("Select an answer!");

        const userVal = parseInt(selected.value);
        const qData = quizPool[currentIdx];
        const feedback = document.getElementById("feedback-area");

        // Compare user selection to our tracked currentCorrectIndex
        if (userVal === currentCorrectIndex) {
            score++;
            feedback.className = "feedback correct-msg";
            feedback.innerText = "CORRECT! " + qData.info;
        } else {
            feedback.className = "feedback wrong-msg";
            // Show the text of the correct answer from the original data
            feedback.innerText = "INCORRECT. The correct answer is: " + qData.options[qData.correct] + ". " + qData.info;
        }

        feedback.style.display = "block";
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizPool.length) {
            loadQuestion();
        } else {
            document.getElementById("quiz-ui").style.display = "none";
            document.getElementById("final-score").style.display = "block";
            document.getElementById("score-val").innerText = score;
            document.getElementById("total-final").innerText = quizPool.length;
        }
    }

    window.onload = initializeQuiz;
</script>
