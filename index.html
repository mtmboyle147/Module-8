{ q: "During a steady glide, the aircraft is considered to be:", options: ["Accelerating", "In equilibrium", "Climbing", "Stalling"], correct: 1, info: "In a steady glide the aircraft is descending at a constant speed with all forces in equilibrium." },

{ q: "In gliding flight, the tangent of the glide angle is equal to:", options: ["Lift ÷ Drag", "Weight ÷ Lift", "Drag ÷ Lift", "Thrust ÷ Weight"], correct: 2, info: "For a steady glide, tanγ = Drag ÷ Lift." },

{ q: "The horizontal distance travelled during a glide is known as the:", options: ["Endurance", "Range", "Service ceiling", "Radius of turn"], correct: 1, info: "Glide range is the horizontal distance travelled before reaching the ground." },

{ q: "The greatest glide range is achieved when:", options: ["Drag is greatest", "Lift-to-drag ratio is at its maximum", "Weight is greatest", "Flaps are fully extended"], correct: 1, info: "Maximum glide range occurs at the maximum lift-to-drag ratio (L/D)." },

{ q: "If an aircraft loses engine power and thrust becomes less than drag, constant airspeed can be maintained by:", options: ["Climbing", "Descending", "Increasing angle of attack only", "Extending the landing gear"], correct: 1, info: "With insufficient thrust, the aircraft must descend to maintain a constant airspeed." },

{ q: "During a constant-speed climb:", options: ["Drag is greater than thrust", "Thrust is greater than drag", "Lift is greater than thrust", "Weight is less than drag"], correct: 1, info: "A climb requires excess thrust over drag." },

{ q: "In a steady vertical climb at constant speed:", options: ["Lift equals weight", "Thrust equals drag only", "Thrust must exceed weight plus drag", "Weight equals thrust"], correct: 2, info: "For a vertical climb, thrust must overcome both the aircraft's weight and aerodynamic drag." },

{ q: "In straight and level unaccelerated flight:", options: ["Lift equals weight and thrust equals drag", "Lift exceeds weight", "Drag exceeds thrust", "Weight exceeds lift"], correct: 0, info: "Steady, level flight exists when all forces are balanced." },

{ q: "Aircraft equilibrium requires:", options: ["Balanced forces only", "Balanced moments only", "Balanced forces and balanced moments", "Equal lift and thrust"], correct: 2, info: "Both the forces and the moments acting on the aircraft must balance for equilibrium." },

{ q: "The primary purpose of the tailplane is to:", options: ["Provide roll control", "Balance the aircraft's pitching moments", "Reduce induced drag", "Increase lift during take-off"], correct: 1, info: "The tailplane provides the balancing force required for longitudinal stability and trim." },

{ q: "Why is the horizontal tailplane normally much smaller than the main wing?", options: ["It produces less drag only", "It operates at higher airspeed", "Its long moment arm allows a relatively small force to balance pitching moments", "It carries less structural load"], correct: 2, info: "Because the tailplane is positioned a considerable distance behind the centre of gravity, a relatively small force can produce a large balancing moment (Moment = Force × Distance)." },

{ q: "At high cruise speed, the angle of attack of the main wing is generally:", options: ["Greater than during approach", "Approximately zero", "Smaller than at low speed", "Greater than the tailplane"], correct: 2, info: "At high speed less angle of attack is required to produce the necessary lift." },

{ q: "As the centre of pressure moves rearwards at high speed, the aircraft tends to:", options: ["Pitch nose up", "Develop a nose-down pitching moment", "Roll to the left", "Yaw towards the dead engine"], correct: 1, info: "A rearward movement of the centre of pressure creates a nose-down pitching moment which must be balanced by the tailplane." },

{ q: "To balance the rearward movement of the centre of pressure during high-speed flight, the tailplane commonly produces:", options: ["An upward aerodynamic force", "A downward aerodynamic force", "No aerodynamic force", "Equal lift to the main wing"], correct: 1, info: "Many conventional aircraft require a downward tail force during cruise to maintain longitudinal equilibrium." },

{ q: "At low speed with a high angle of attack, the centre of pressure generally:", options: ["Moves rearwards", "Moves forwards", "Remains fixed", "Moves to the wingtip"], correct: 1, info: "Increasing angle of attack moves the centre of pressure forwards on a conventional cambered aerofoil." },

{ q: "Because the tailplane may be required to produce either upward or downward aerodynamic force, it is commonly constructed using a:", options: ["Highly cambered aerofoil", "Symmetrical aerofoil section", "Flat plate aerofoil", "Supercritical aerofoil"], correct: 1, info: "A symmetrical aerofoil allows the tailplane to generate force efficiently in either direction." },

{ q: "An all-moving tailplane differs from a conventional tailplane because:", options: ["Only the elevator moves", "The complete stabiliser changes its angle", "The trim tab is removed", "It has no control surface"], correct: 1, info: "An all-moving tailplane changes the incidence of the entire horizontal stabiliser, providing greater pitch authority." },

{ q: "Which relationship is used to calculate a pitching moment?", options: ["Moment = Force ÷ Distance", "Moment = Force × Distance", "Moment = Mass × Velocity", "Moment = Lift ÷ Weight"], correct: 1, info: "The basic engineering relationship is Moment = Force × Perpendicular Distance." },

{ q: "For an aircraft to remain in equilibrium during steady flight:", options: ["Only lift and weight must balance", "Only thrust and drag must balance", "Both the forces and the moments must balance", "The centre of pressure must coincide with the centre of gravity"], correct: 2, info: "Steady equilibrium requires both translational and rotational equilibrium." },

{ q: "If the four primary aerodynamic forces act through different points on the aircraft, stable flight is maintained only if:", options: ["Lift exceeds weight", "The resulting moments balance each other", "Thrust exceeds drag", "The centre of pressure equals the centre of gravity"], correct: 1, info: "Because the forces act at different locations, their moments must balance to prevent pitching." },

{ q: "What force keeps an aircraft following a curved flight path during a coordinated turn?", options: ["Centrifugal force", "Centripetal force", "Weight", "Thrust"], correct: 1, info: "Centripetal force acts towards the centre of the turn and keeps the aircraft following a curved path." },

{ q: "In a correctly coordinated level turn, the horizontal component of lift provides the:", options: ["Aircraft weight", "Drag force", "Centripetal force", "Engine thrust"], correct: 2, info: "The horizontal component of lift provides the centripetal force required to turn the aircraft." },

{ q: "In a steady level turn, the vertical component of lift must equal:", options: ["Drag", "Weight", "Thrust", "Centripetal force"], correct: 1, info: "To maintain altitude during the turn, the vertical component of lift must balance the aircraft's weight." },

{ q: "To maintain altitude during a banked turn, the pilot must generally:", options: ["Reduce lift", "Increase lift", "Reduce thrust", "Lower the landing gear"], correct: 1, info: "Because part of the lift is used to turn the aircraft, total lift must be increased to maintain altitude." },

{ q: "As bank angle increases during a level turn, the load factor will:", options: ["Decrease", "Remain constant", "Increase", "Become zero"], correct: 2, info: "Increasing bank angle requires more lift, which increases the load factor." },

{ q: "Load factor (n) is defined as:", options: ["Weight ÷ Lift", "Lift ÷ Weight", "Lift × Weight", "Drag ÷ Lift"], correct: 1, info: "Load factor is the ratio of lift to aircraft weight." },

{ q: "Load factor is normally expressed in units of:", options: ["Pascals", "Knots", "g", "Metres per second"], correct: 2, info: "Load factor is expressed as multiples of gravitational acceleration (g)." },

{ q: "During straight and level unaccelerated flight, the aircraft experiences a load factor of:", options: ["0 g", "0.5 g", "1 g", "2 g"], correct: 2, info: "Lift equals weight in straight and level flight, producing a load factor of 1 g." },

{ q: "During a level turn at approximately 60° of bank, the load factor is closest to:", options: ["1.4 g", "1.7 g", "2 g", "3 g"], correct: 2, info: "A 60° level turn produces approximately 2 g." },

{ q: "Increasing load factor has what effect on the aircraft's stall speed?", options: ["It decreases", "It remains unchanged", "It increases", "It becomes zero"], correct: 2, info: "As load factor increases, the wing must generate more lift, causing the stall speed to increase." },

{ q: "A steeply banked aircraft can stall at:", options: ["Only a low airspeed", "A much higher airspeed than in straight and level flight", "Only during landing", "Only with flaps extended"], correct: 1, info: "High load factors increase the stall speed, so an aircraft can stall at a much higher airspeed during a steep turn." },

{ q: "The relationship between stall speed and load factor is approximately proportional to the:", options: ["Load factor", "Square root of the load factor", "Load factor squared", "Inverse of the load factor"], correct: 1, info: "Stall speed increases with the square root of the load factor." },

{ q: "A positive load factor exists when:", options: ["Lift acts downward relative to the aircraft", "The aerodynamic force acts upward relative to the aircraft", "The aircraft is inverted", "The engine thrust exceeds drag"], correct: 1, info: "Positive g occurs when the resultant aerodynamic force acts upward relative to the aircraft." },

{ q: "A negative load factor exists when:", options: ["The aerodynamic force acts downward relative to the aircraft", "The aircraft is climbing", "Lift equals weight", "Engine thrust is reduced"], correct: 0, info: "Negative g occurs when the aerodynamic force acts downward relative to the aircraft." },

{ q: "Aircraft structures are designed to withstand:", options: ["Only positive limit loads", "Only negative limit loads", "Both positive and negative limit loads", "Only landing loads"], correct: 2, info: "Certification requires aircraft structures to withstand both positive and negative loading." },

{ q: "Limit load is defined as:", options: ["The maximum load expected during normal service", "The load at which the structure fails", "1.5 times the maximum operating load", "The load experienced during take-off"], correct: 0, info: "Limit load is the greatest load expected during normal operation without permanent deformation." },

{ q: "Ultimate load is normally equal to:", options: ["The limit load", "The limit load multiplied by 1.5", "Twice the limit load", "The maximum take-off weight"], correct: 1, info: "Ultimate load is normally 1.5 times the limit load unless otherwise specified." },

{ q: "Certification standards require an aircraft structure to withstand ultimate load for at least:", options: ["1 second", "2 seconds", "3 seconds", "10 seconds"], correct: 2, info: "CS-25 requires the structure to support ultimate loads for at least three seconds." },

{ q: "An aircraft structure should suffer no permanent deformation when subjected to:", options: ["Ultimate load", "Limit load", "Twice the ultimate load", "Maximum cruise speed"], correct: 1, info: "Limit loads must not produce detrimental permanent deformation." },

{ q: "Which of the following is an example of a dynamic load?", options: ["Fuel weight", "Fatigue loading from repeated stress cycles", "Static aircraft weight", "Cabin pressure only"], correct: 1, info: "Dynamic loads vary with time and include repeated fatigue loading caused by cyclic stresses." },

{ q: "The aircraft flight envelope is also commonly known as the:", options: ["Lift curve", "V-n diagram", "Drag polar", "Mach cone"], correct: 1, info: "The flight envelope is presented as a V-n diagram, plotting load factor against equivalent airspeed." },

{ q: "The manoeuvring envelope plots:", options: ["Altitude against airspeed", "Load factor against equivalent airspeed", "Lift against drag", "Weight against altitude"], correct: 1, info: "The V-n diagram plots load factor (n) against equivalent airspeed (EAS)." },

{ q: "Exceeding the manoeuvring envelope may result in:", options: ["Improved climb performance", "Structural damage", "Reduced induced drag", "Lower stall speed"], correct: 1, info: "Operating outside the approved flight envelope can overstress the aircraft structure." },

{ q: "The manoeuvring speed (VA) is significant because:", options: ["It is the maximum cruise speed", "Below VA, full control deflection should stall the aircraft before structural damage occurs", "It is the maximum flap extension speed", "It is the speed for best glide"], correct: 1, info: "Below manoeuvring speed, the aircraft should stall before exceeding its structural limit load." },

{ q: "Why are gust loads considered during aircraft certification?", options: ["They reduce lift", "Atmospheric turbulence imposes additional structural loads", "They reduce drag", "They increase engine thrust"], correct: 1, info: "Vertical gusts can significantly increase aerodynamic loading and must be considered during certification." },

{ q: "The primary purpose of the flight envelope is to:", options: ["Improve fuel economy", "Define the safe combinations of airspeed and load factor", "Calculate the centre of gravity", "Determine best climb speed"], correct: 1, info: "The flight envelope defines the aircraft's structural and aerodynamic operating limits." },

{ q: "Structural failure is most likely to occur if an aircraft:", options: ["Exceeds the ultimate load", "Flies below stall speed", "Descends at idle power", "Uses full flap"], correct: 0, info: "Ultimate load is the maximum load the structure is designed to withstand. Exceeding it may cause structural failure." },

{ q: "Which certification specification defines the structural requirements referred to in these notes?", options: ["CS-23", "CS-25", "Part-66", "ICAO Annex 2"], correct: 1, info: "Transport-category aircraft structural requirements are defined in CS-25." },

{ q: "Wing loading is defined as:", options: ["Lift divided by drag", "Aircraft weight divided by wing area", "Wing area divided by aircraft weight", "Lift divided by wing span"], correct: 1, info: "Wing loading equals aircraft weight divided by wing area." },

{ q: "An increase in aircraft weight generally causes wing loading to:", options: ["Decrease", "Increase", "Remain unchanged", "Become zero"], correct: 1, info: "If wing area remains constant, increasing aircraft weight increases wing loading." },

{ q: "What is the primary purpose of lift augmentation devices?", options: ["To increase maximum lift at low airspeeds", "To reduce aircraft weight", "To increase cruise speed", "To reduce engine thrust"], correct: 0, info: "Lift augmentation devices increase the maximum lift coefficient (CLmax), allowing safer take-off and landing at lower speeds." },

{ q: "Which type of flap consists of a simple hinged section at the trailing edge of the wing?", options: ["Split flap", "Slotted flap", "Plain flap", "Fowler flap"], correct: 2, info: "A plain flap is the simplest flap design, hinging downward from the trailing edge to increase camber." },

{ q: "Compared with a plain flap, a split flap generally:", options: ["Produces less drag", "Produces greater drag with a moderate increase in lift", "Produces no increase in lift", "Is used only on supersonic aircraft"], correct: 1, info: "Split flaps generate a useful increase in lift but also create significantly more drag than plain flaps." },

{ q: "The principal advantage of a slotted flap is that it:", options: ["Reduces aircraft weight", "Allows high-energy air to re-energise the boundary layer", "Eliminates induced drag", "Moves the centre of gravity forward"], correct: 1, info: "The slot allows high-energy air from beneath the wing to flow over the upper surface, delaying flow separation." },

{ q: "Compared with a plain flap, a Fowler flap primarily increases:", options: ["Wing span only", "Wing area and wing camber", "Engine thrust", "Aspect ratio"], correct: 1, info: "A Fowler flap moves rearwards before deflecting, increasing both wing area and camber for a larger lift increase." },

{ q: "Which trailing-edge flap generally produces the greatest increase in maximum lift coefficient?", options: ["Plain flap", "Split flap", "Fowler flap", "Trim flap"], correct: 2, info: "Fowler flaps provide one of the greatest increases in CLmax because they increase both wing area and camber." },

{ q: "The primary function of a leading-edge slat is to:", options: ["Increase engine cooling", "Delay airflow separation at high angles of attack", "Reduce wing loading", "Reduce parasite drag during cruise"], correct: 1, info: "Leading-edge slats improve airflow over the wing, delaying the stall and increasing CLmax." },

{ q: "A fixed leading-edge slot differs from a movable slat because it:", options: ["Cannot increase CLmax", "Remains permanently open", "Is used only on helicopters", "Retracts automatically above stall speed"], correct: 1, info: "A fixed slot is always open, whereas a slat normally extends and retracts as required." },

{ q: "Deploying flaps during landing primarily allows the aircraft to:", options: ["Cruise faster", "Approach and land at a lower airspeed", "Reduce wing area", "Reduce engine fuel flow to zero"], correct: 1, info: "Flaps increase lift and drag, allowing a steeper, slower and more controlled approach." },

{ q: "Why do lift augmentation devices increase drag as well as lift?", options: ["They increase wing loading", "They disturb the airflow and increase pressure drag while increasing camber", "They reduce the lift coefficient", "They decrease wing area"], correct: 1, info: "High-lift devices increase wing camber and often wing area, but they also increase pressure drag and skin-friction drag." },

{ q: "Blown flaps improve lift by:", options: ["Reducing wing area", "Directing high-energy engine bleed air over the flap surface", "Increasing aircraft mass", "Reducing engine thrust"], correct: 1, info: "Blown flaps use engine bleed air to re-energise the airflow over the flap, delaying boundary layer separation and increasing lift." },

let quizPool = [];
    let currentIdx = 0;
    let score = 0;
    let currentCorrectIndex = null; // Track the new position of the correct answer

    function initializeQuiz() {
        // 1. Shuffle and pick 30 questions from the 220
        let shuffled = [...allQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        quizPool = shuffled.slice(0, 30);
        
        currentIdx = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        const qData = quizPool[currentIdx];
        
        // UI Updates
        document.getElementById("current-num").innerText = currentIdx + 1;
        document.getElementById("total-num").innerText = quizPool.length;
        document.getElementById("q-text").innerText = qData.q;
        document.getElementById("progress-fill").style.width = (currentIdx / quizPool.length * 100) + "%";
        
        // --- RANDOMIZE OPTIONS ---
        // Create an array of indices [0, 1, 2]
        let optionIndices = qData.options.map((_, index) => index);
        
        // Shuffle the indices
        for (let i = optionIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionIndices[i], optionIndices[j]] = [optionIndices[j], optionIndices[i]];
        }

        const list = document.getElementById("options-list");
        list.innerHTML = "";

        // Re-map the options based on the shuffled indices
        optionIndices.forEach((originalIndex, displayIndex) => {
            // Check if this specific option was the original correct one
            if (originalIndex === qData.correct) {
                currentCorrectIndex = displayIndex; 
            }

            const div = document.createElement("div");
            div.className = "option";
            div.innerHTML = `
                <input type="radio" name="answer" id="opt${displayIndex}" value="${displayIndex}">
                <label for="opt${displayIndex}">${qData.options[originalIndex]}</label>
            `;
            div.onclick = () => { document.getElementById(`opt${displayIndex}`).checked = true; };
            list.appendChild(div);
        });

        document.getElementById("feedback-area").style.display = "none";
        document.getElementById("submit-btn").style.display = "block";
        document.getElementById("next-btn").style.display = "none";
    }

    function checkAnswer() {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected) return alert("Select an answer!");

        const userVal = parseInt(selected.value);
        const qData = quizPool[currentIdx];
        const feedback = document.getElementById("feedback-area");

        // Compare user selection to our tracked currentCorrectIndex
        if (userVal === currentCorrectIndex) {
            score++;
            feedback.className = "feedback correct-msg";
            feedback.innerText = "CORRECT! " + qData.info;
        } else {
            feedback.className = "feedback wrong-msg";
            // Show the text of the correct answer from the original data
            feedback.innerText = "INCORRECT. The correct answer is: " + qData.options[qData.correct] + ". " + qData.info;
        }

        feedback.style.display = "block";
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizPool.length) {
            loadQuestion();
        } else {
            document.getElementById("quiz-ui").style.display = "none";
            document.getElementById("final-score").style.display = "block";
            document.getElementById("score-val").innerText = score;
            document.getElementById("total-final").innerText = quizPool.length;
        }
    }

    window.onload = initializeQuiz;
</script>
